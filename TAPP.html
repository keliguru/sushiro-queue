<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>設定檔與項目管理器</title>
    <style>
        :root {
            --primary: #4f46e5;
            --primary-hover: #4338ca;
            --danger: #ef4444;
            --danger-hover: #dc2626;
            --bg: #f8fafc;
            --card: #ffffff;
            --text: #0f172a;
            --text-light: #64748b;
            --border: #e2e8f0;
            --success: #10b981;
            --warning: #f59e0b;
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 16px;
            display: flex;
            justify-content: center;
        }

        .container {
            width: 100%;
            max-width: 1200px;
            display: grid;
            grid-template-columns: 1fr;
            gap: 16px;
        }

        @media (min-width: 768px) {
            body { padding: 24px; }
            .container {
                grid-template-columns: minmax(0, 320px) 1fr;
                gap: 24px;
                transition: grid-template-columns 0.3s ease;
            }
            .container.profile-collapsed {
                grid-template-columns: 0px 1fr;
                gap: 0px;
            }
        }
        
        #profileContainer {
            overflow: hidden;
            transition: all 0.3s ease;
        }
        
        #profileContainer.collapsed { display: none; }
        @media (min-width: 768px) {
            #profileContainer.collapsed {
                display: block;
                opacity: 0;
                transform: translateX(-20px);
                pointer-events: none;
            }
        }

        .right-panels {
            display: grid;
            grid-template-columns: 1fr;
            gap: 16px;
        }

        @media (min-width: 768px) { .right-panels { gap: 24px; } }

        .breadcrumb {
            display: flex;
            align-items: center;
            flex-wrap: wrap;
            gap: 8px;
            background: var(--card);
            padding: 12px 16px;
            border-radius: 8px;
            border: 1px solid var(--border);
            font-size: 0.9rem;
            font-weight: 500;
            margin-bottom: 4px;
        }

        .breadcrumb-item {
            color: var(--text-light);
            text-decoration: none;
            cursor: pointer;
            transition: color 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 4px;
        }

        .breadcrumb-item:hover { color: var(--primary); }
        .breadcrumb-item.active {
            color: var(--text);
            font-weight: 600;
            cursor: default;
        }

        .breadcrumb-separator { color: var(--border); user-select: none; }

        .card {
            background: var(--card);
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.05), 0 2px 4px -2px rgb(0 0 0 / 0.05);
            border: 1px solid var(--border);
            height: fit-content;
            width: 100%;
        }

        h1, h2, h3 { margin-top: 0; font-weight: 700; }
        h1 { font-size: 1.4rem; margin-bottom: 20px; color: #1e293b; }
        h2 { font-size: 1.15rem; margin-bottom: 16px; padding-bottom: 12px; border-bottom: 2px solid var(--bg); }
        h3 { font-size: 0.95rem; margin-top: 20px; margin-bottom: 12px; color: var(--text-light); }

        .form-group { display: flex; flex-direction: column; gap: 6px; margin-bottom: 16px; }
        .form-group.inline { flex-direction: row; gap: 8px; }
        .form-group.inline input[type="text"] { flex: 1; }

        label { font-size: 0.85rem; font-weight: 600; color: var(--text-light); }

        input[type="text"], select {
            width: 100%;
            padding: 12px 14px;
            border: 1px solid var(--border);
            border-radius: 8px;
            font-size: 16px; 
            outline: none;
            background-color: #fff;
            transition: all 0.2s;
            -webkit-appearance: none;
            appearance: none;
        }

        select {
            background-image: url("data:image/svg+xml;charset=UTF-8,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%2364748b' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3E%3Cpolyline points='6 9 12 15 18 9'%3E%3C/polyline%3E%3C/svg%3E");
            background-repeat: no-repeat;
            background-position: right 14px center;
            background-size: 16px;
            padding-right: 40px;
        }

        input[type="text"]:focus, select:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.1);
        }

        .radio-group { display: flex; flex-direction: column; gap: 12px; padding: 4px 0; }
        @media (min-width: 480px) { .radio-group { flex-direction: row; gap: 16px; } }

        .radio-label {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.95rem;
            cursor: pointer;
            padding: 6px 0;
        }
        .radio-label input[type="radio"] { width: 18px; height: 18px; margin: 0; }

        button {
            padding: 12px 18px; border: none; border-radius: 8px; cursor: pointer;
            font-weight: 600; font-size: 0.95rem; transition: all 0.2s;
            display: inline-flex; align-items: center; justify-content: center; gap: 6px;
            -webkit-appearance: none; appearance: none;
        }

        .btn-primary { background-color: var(--primary); color: white; }
        .btn-primary:hover, .btn-primary:active { background-color: var(--primary-hover); }
        .btn-danger { background-color: #fee2e2; color: var(--danger); padding: 8px 14px; font-size: 0.85rem; }
        .btn-danger:hover, .btn-danger:active { background-color: var(--danger); color: white; }

        .list-group { list-style: none; padding: 0; margin: 0; }
        .list-item {
            display: flex; justify-content: space-between; align-items: center; padding: 14px;
            border: 1px solid var(--border); border-radius: 8px; margin-bottom: 8px;
            background: var(--card); cursor: pointer; transition: all 0.2s;
        }
        .list-item:hover, .list-item:active { border-color: var(--primary); background-color: #f8fafc; }
        .list-item.active { background-color: #eef2ff; border-color: var(--primary); color: var(--primary); font-weight: 600; }
        .list-item .btn-group { display: flex; gap: 8px; }
        
        .btn-eta { background-color: #e0e7ff; color: var(--primary); padding: 8px 14px; font-size: 0.85rem; }
        .btn-eta:hover, .btn-eta:active { background-color: var(--primary); color: white; }

        .element-item {
            display: flex; justify-content: space-between; align-items: center;
            padding: 12px 14px; background: var(--bg); border-radius: 8px; margin-bottom: 8px; font-size: 0.95rem;
        }

        .divider { height: 1px; background-color: var(--border); margin: 20px 0; }
        .no-data { color: var(--text-light); font-style: italic; text-align: center; padding: 30px 20px; font-size: 0.95rem; }
        .error { color: var(--danger); background-color: #fee2e2; padding: 12px; border-radius: 8px; margin-top: 12px; font-size: 0.9rem; font-weight: 500; }
        .loading { color: var(--primary); background-color: #eef2ff; padding: 12px; border-radius: 8px; margin-top: 12px; font-size: 0.9rem; font-weight: 500; text-align: center; }

        .controls { flex-direction: column; align-items: stretch; background: #f1f5f9; padding: 14px; border-radius: 8px; margin-bottom: 20px; gap: 12px; }
        @media (min-width: 480px) { .controls { flex-direction: row; justify-content: space-between; align-items: center; } }

        .update-status { font-size: 0.85rem; color: var(--text-light); font-weight: 500; text-align: center; }
        .refresh-btn { background-color: #fff; border: 1px solid var(--border); color: var(--text); padding: 10px 16px; font-size: 0.9rem; box-shadow: 0 1px 2px rgb(0 0 0 / 0.05); width: 100%; }
        @media (min-width: 480px) { .refresh-btn { width: auto; } }
        .refresh-btn:hover { background-color: #f8fafc; }

        #bus-container { display: grid; grid-template-columns: 1fr; gap: 16px; margin-top: 16px; }
        @media (min-width: 640px) { #bus-container { grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); } }

        #bus-container .card { padding: 16px; border-top: 4px solid var(--primary); background: #fff; border-radius: 8px; }
        .card-header { margin-bottom: 12px; padding-bottom: 10px; border-bottom: 1px solid var(--border); }
        .route-title-area { display: flex; align-items: baseline; gap: 8px; margin-bottom: 4px; }
        .route-number { font-size: 1.6rem; font-weight: 800; color: var(--primary); }
        .route-direction { font-size: 0.85rem; background-color: #e0e7ff; color: var(--primary); padding: 2px 6px; border-radius: 4px; font-weight: 600; }
        .stop-info { font-size: 0.95rem; font-weight: 600; color: var(--text); margin-top: 6px; }
        .stop-id-label { font-size: 0.75rem; color: var(--text-light); margin-top: 2px; }

        .eta-list { list-style: none; padding: 0; margin: 0; }
        .eta-item { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px dashed var(--border); }
        .eta-item:last-child { border-bottom: none; }
        .destination { font-size: 0.9rem; color: var(--text); padding-right: 8px; }
        
        .time-badge { font-size: 0.85rem; font-weight: 600; background-color: #f1f5f9; color: var(--text); padding: 6px 10px; border-radius: 6px; white-space: nowrap; }
        .time-badge.urgent { background-color: #fee2e2; color: var(--danger); animation: pulse 2s infinite; }

        .spinning .refresh-icon { display: inline-block; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.8; } }
    </style>
</head>
<body>

<div class="container" id="mainContainer">
    <div class="card" id="profileContainer">
        <h2>設定檔列表 (Profiles)</h2>
        <div class="form-group inline">
            <input type="text" id="profileInput" placeholder="輸入設定檔名稱...">
            <button class="btn-primary" onclick="addProfile()">新增</button>
        </div>
        <ul id="profileList" class="list-group"></ul>
    </div>

    <div class="right-panels">
        <div class="breadcrumb" id="breadcrumbArea" style="display: none;">
            <span class="breadcrumb-item" onclick="expandProfiles()">🏠 設定檔列表</span>
            <span class="breadcrumb-separator">/</span>
            <span class="breadcrumb-item active" id="breadcrumbCurrent">未選取</span>
        </div>

        <div class="card" id="profileSettingCard" name="profileSetting">
            <h2>內容管理：<span id="currentProfileName">請先選取設定檔</span></h2>
            
            <div id="elementSection" style="display: none;">
                <div class="form-group">
                    <label for="companyId">營運商公司：</label>
                    <select id="companyId" onchange="toggleOperatorFields()">
                        <option value="CTB" selected>CTB - 城巴有限公司</option>
                        <option value="NWFB">NWFB - 新世界第一巴士服務有限公司</option>
                        <option value="KMB">KMB - 九龍巴士</option>
                        <option value="MIB">GMB/MIB - 專線小巴</option>
                    </select>
                </div>

                <div class="form-group" id="regionField" style="display: none;">
                    <label for="regionSelect">小巴地區：</label>
                    <select id="regionSelect" onchange="loadStops()">
                        <option value="HKI">HKI - 香港島</option>
                        <option value="KLN">KLN - 九龍</option>
                        <option value="NT">NT - 新界</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="route">路線編號：</label>
                    <input type="text" id="route" value="11" placeholder="例如：11, 107, 58" oninput="debounceLoadStops()">
                </div>

                <div class="form-group">
                    <label>行駛方向：</label>
                    <div class="radio-group">
                        <label class="radio-label"><input type="radio" name="direction" value="outbound" checked onchange="loadStops()"> 去程 (往目的地)</label>
                        <label class="radio-label"><input type="radio" name="direction" value="inbound" onchange="loadStops()"> 回程 (往起點)</label>
                    </div>
                </div>

                <div class="form-group">
                    <label for="stopSelect">巴士 / 小巴站點：</label>
                    <select id="stopSelect" disabled>
                        <option value="">-- 請先在上方設定路線編號 --</option>
                    </select>
                </div>

                <div class="form-group" style="margin-top: 20px;">
                    <button class="btn-primary" onclick="addElement()">新增至設定檔</button>
                </div>

                <div class="divider"></div>
                <h3>已儲存的項目列表</h3>
                <ul id="elementList" class="list-group"></ul>
            </div>
            
            <div id="errorMessage" class="error" style="display: none;"></div>
            <div id="statusMessage" class="loading" style="display: none;">正在載入網路數據...</div>
            <div id="placeholderText" class="no-data">請在左側點擊或建立一個設定檔來管理其內容。</div>
        </div>
        
        <div class="card" id="arrivalContainerCard" name="arrivalContainer" style="display: none;">
            <h1>🚌 實時到站時間 (ETA)</h1>
            <div class="form-group controls">
                <div class="update-status" id="update-time">請先點擊左側設定檔</div>
                <button class="refresh-btn" id="refresh-btn" onclick="manualRefresh()">
                    <span class="refresh-icon">🔄</span>重新整理
                </button>
            </div>
            <div id="bus-container">
                <div class="no-data">暫無即時數據，請選取設定檔並載入 ETA。</div>
            </div>
        </div>
    </div>
</div>

<script>
    let profiles = JSON.parse(localStorage.getItem('profiles_data')) || {};
    let currentProfileId = null;
    const baseUrlCtb = 'https://rt.data.gov.hk';
    const baseUrlKmb = 'https://data.etabus.gov.hk';
	
    const allOriginsProxy = 'https://cors.freehi.workers.dev/?';
    const baseUrlMib = allOriginsProxy + ('https://data.etagmb.gov.hk');
	
    const stopNameCache = {};
    const busTargets = [];
    let debounceTimer;
    let autoRefreshTimer = null;
    let isEtaLoading = false;

    document.addEventListener('DOMContentLoaded', () => renderProfiles());

    function saveToStorage() { localStorage.setItem('profiles_data', JSON.stringify(profiles)); }

    function toggleOperatorFields() {
        const companyId = document.getElementById('companyId').value;
        const regionField = document.getElementById('regionField');
        if (companyId === 'MIB') {
            regionField.style.display = 'flex';
        } else {
            regionField.style.display = 'none';
        }
        loadStops();
    }

    function renderProfiles() {
        const profileList = document.getElementById('profileList');
        profileList.innerHTML = '';
        const keys = Object.keys(profiles);
        if (keys.length === 0) { profileList.innerHTML = '<li class="no-data">暫無設定檔</li>'; return; }

        keys.forEach(id => {
            const li = document.createElement('li');
            li.className = `list-item ${id === currentProfileId ? 'active' : ''}`;
            li.onclick = (e) => { if (e.target.tagName !== 'BUTTON') renderETA(id); };

            const span = document.createElement('span'); span.textContent = profiles[id].name;
            const btnGroup = document.createElement('div'); btnGroup.className = 'btn-group';

            const etaBtn = document.createElement('button'); etaBtn.className = 'btn-eta'; etaBtn.textContent = '內容管理'; etaBtn.onclick = (e) => { e.stopPropagation(); selectProfile(id); };
            const deleteBtn = document.createElement('button'); deleteBtn.className = 'btn-danger'; deleteBtn.textContent = '刪除'; deleteBtn.onclick = (e) => { e.stopPropagation(); deleteProfile(id); };

            btnGroup.appendChild(etaBtn); btnGroup.appendChild(deleteBtn);
            li.appendChild(span); li.appendChild(btnGroup);
            profileList.appendChild(li);
        });
    }

    function renderElements() {
        const elementList = document.getElementById('elementList');
        const elementSection = document.getElementById('elementSection');
        const placeholderText = document.getElementById('placeholderText');
        const currentProfileName = document.getElementById('currentProfileName');

        if (!currentProfileId || !profiles[currentProfileId]) {
            elementSection.style.display = 'none'; placeholderText.style.display = 'block'; currentProfileName.textContent = '請先選取設定檔'; return;
        }

        elementSection.style.display = 'block'; placeholderText.style.display = 'none';
        currentProfileName.textContent = profiles[currentProfileId].name;
        elementList.innerHTML = '';

        profiles[currentProfileId].elements.forEach((element, index) => {
            const li = document.createElement('li'); li.className = 'element-item';
            const span = document.createElement('span');
            try {
                const obj = JSON.parse(element);
                span.textContent = `[${obj.company}] 線路 ${obj.route} (${obj.direction === 'outbound' ? '去程' : '回程'}) - ${obj.stopName || '未知站名'}`;
            } catch(e) { span.textContent = element; }

            const deleteBtn = document.createElement('button'); deleteBtn.className = 'btn-danger'; deleteBtn.textContent = '刪除'; deleteBtn.onclick = () => deleteElement(index);
            li.appendChild(span); li.appendChild(deleteBtn); elementList.appendChild(li);
        });
    }

    function addProfile() {
        const input = document.getElementById('profileInput'); const name = input.value.trim(); if (!name) { alert('請輸入設定檔名稱！'); return; }
        const id = 'prof_' + Date.now(); profiles[id] = { name: name, elements: [] };
        saveToStorage(); input.value = ''; currentProfileId = id; renderProfiles(); selectProfile(id);
    }

    function deleteProfile(id) {
        if (!confirm('確定要刪除此設定檔嗎？')) return;
        delete profiles[id]; if (currentProfileId === id) { currentProfileId = null; expandProfiles(); }
        saveToStorage(); renderProfiles(); renderElements();
    }

    function collapseProfiles(profileName) {
        document.getElementById('profileContainer').classList.add('collapsed');
        document.getElementById('mainContainer').classList.add('profile-collapsed');
        document.getElementById('breadcrumbCurrent').textContent = profileName;
        document.getElementById('breadcrumbArea').style.display = 'flex';
    }

    function expandProfiles() {
        if (autoRefreshTimer) clearInterval(autoRefreshTimer);
        currentProfileId = null;
        document.getElementById('profileContainer').classList.remove('collapsed');
        document.getElementById('mainContainer').classList.remove('profile-collapsed');
        document.getElementById('breadcrumbArea').style.display = 'none';
        document.getElementById('profileSettingCard').style.display = 'block';
        document.getElementById('arrivalContainerCard').style.display = 'none';
        renderProfiles(); renderElements();
    }

    function selectProfile(id) {
        currentProfileId = id; 
        document.getElementById('profileSettingCard').style.display = 'block';
        document.getElementById('arrivalContainerCard').style.display = 'none';
        collapseProfiles(profiles[id].name + " (內容管理)"); 
        renderProfiles(); 
        renderElements();
    }

    function addElement() {
        if (!currentProfileId) return;
        const company = document.getElementById('companyId').value;
        const route = document.getElementById('route').value.trim().toUpperCase();
        const direction = document.querySelector('input[name="direction"]:checked').value;
        const stopSelect = document.getElementById('stopSelect');
        const stopValue = stopSelect.options[stopSelect.selectedIndex]?.value || '';
        const stopName = stopSelect.options[stopSelect.selectedIndex]?.text || '';
        if (!route) { alert('請輸入路線編號！'); return; }
        
        let routeId = ""; let vSeq = "";
        if (company === 'MIB') {
            routeId = stopSelect.options[stopSelect.selectedIndex]?.getAttribute('data-route-id') || '';
            vSeq = stopSelect.options[stopSelect.selectedIndex]?.getAttribute('data-vseq') || '';
        }

        const elementObj = { company, route, direction, stopValue, stopName, routeId, vSeq };
        profiles[currentProfileId].elements.push(JSON.stringify(elementObj));
        saveToStorage(); renderElements();
    }

    function deleteElement(index) {
        if (!currentProfileId) return; profiles[currentProfileId].elements.splice(index, 1); saveToStorage(); renderElements();
    }
    
    function debounceLoadStops() { clearTimeout(debounceTimer); debounceTimer = setTimeout(loadStops, 500); }

    async function loadStops() {
        const companyId = document.getElementById('companyId').value;
        const route = document.getElementById('route').value.trim().toUpperCase();
        const direction = document.querySelector('input[name="direction"]:checked').value;
        const stopSelect = document.getElementById('stopSelect');
        const statusMessage = document.getElementById('statusMessage');
        const errorMessage = document.getElementById('errorMessage');

        stopSelect.innerHTML = '<option value="">-- 同步路線地圖中... --</option>';
        stopSelect.disabled = true; errorMessage.style.display = 'none';

        if (!route) { stopSelect.innerHTML = '<option value="">-- 請先輸入正確路線 --</option>'; return; }
        statusMessage.style.display = 'block'; statusMessage.innerText = `獲取 ${companyId} 路線站點列表...`;

        try {
            stopSelect.innerHTML = '';
            
            if (companyId === 'MIB') {
                const selectedRegion = document.getElementById('regionSelect').value;
                
                const response = await fetch(`${baseUrlMib}/route/${selectedRegion}/${route}`);
                if (!response.ok) throw new Error(`找不到小巴路線 ${route}`);
                const mibJson = await response.json();
                
                if (!mibJson.data || mibJson.data.length === 0) {
                    throw new Error(`在選擇的區域中找不到小巴路線 ${route}`);
                }
                
                const targetGroupId = direction === 'outbound' ? 1 : 2;
                const mibRouteData = mibJson.data.find(item => parseInt(item.group_id) === targetGroupId) || mibJson.data[0];
                
                if (!mibRouteData) throw new Error(`找不到小巴路線 ${route} 對應的方向資料`);
                const routeId = mibRouteData.route_id;
                const groupId = mibRouteData.group_id; 

                const stopRes = await fetch(`${baseUrlMib}/route-stop/${routeId}/${targetGroupId}`);
                if (!stopRes.ok) throw new Error("無法載入此小巴路線站點列表");
                const stopJson = await stopRes.json();
                const routeStops = stopJson.data?.route_stops || [];

                if(routeStops.length === 0) throw new Error("此小巴線路暫無站點數據");

                stopSelect.disabled = false;
                routeStops.forEach(item => {
                    const option = document.createElement('option');
                    option.value = item.stop_id;
                    option.text = `${item.stop_seq}. ${item.name_tc}`;
                    option.setAttribute('data-route-id', routeId);
                    option.setAttribute('data-vseq', item.stop_seq);
                    stopSelect.appendChild(option);
                });

            } else if (companyId === 'KMB') {
                const kmbDir = direction === 'outbound' ? 'outbound' : 'inbound';
                const res = await fetch(`${baseUrlKmb}/v1/transport/kmb/route-stop/${route}/${kmbDir}/1`);
                if (!res.ok) throw new Error(`九巴路線不支援或輸入錯誤`);
                const json = await res.json();
                const stopList = json.data || [];

                if (stopList.length === 0) throw new Error(`找不到九巴路線 ${route}`);
                
                stopSelect.disabled = false;
                const namePromises = stopList.map(async (item) => {
                    const name = await getStopName('KMB', item.stop);
                    return { stopId: item.stop, text: `${item.seq}. (${name})` };
                });
                const resolved = await Promise.all(namePromises);
                resolved.forEach(opt => {
                    const option = document.createElement('option'); option.value = opt.stopId; option.text = opt.text;
                    stopSelect.appendChild(option);
                });

            } else {
                const res = await fetch(`${baseUrlCtb}/v1/transport/citybus-nwfb/route-stop/${companyId}/${route}/${direction}`);
                if (!res.ok) throw new Error(`城巴數據請求失敗`);
                const json = await res.json();
                const stopList = json.data || [];

                if (stopList.length === 0) throw new Error(`找不到城巴路線 ${route}`);
                
                stopSelect.disabled = false;
                const namePromises = stopList.map(async (item) => {
                    const name = await getStopName(companyId, item.stop);
                    return { stopId: item.stop, text: `${item.seq}. (${name})` };
                });
                const resolved = await Promise.all(namePromises);
                resolved.forEach(opt => {
                    const option = document.createElement('option'); option.value = opt.stopId; option.text = opt.text;
                    stopSelect.appendChild(option);
                });
            }

            statusMessage.style.display = 'none';
        } catch (error) {
            statusMessage.style.display = 'none';
            stopSelect.innerHTML = '<option value="">-- 數據不可用 --</option>';
            errorMessage.style.display = 'block'; errorMessage.innerText = `錯誤: ${error.message}`;
        }
    }
    
    async function getStopName(company, stopId) {
        const cacheKey = `${company}_${stopId}`; if (stopNameCache[cacheKey]) return stopNameCache[cacheKey];
        let url = company === 'KMB' ? `${baseUrlKmb}/v1/transport/kmb/stop/${stopId}` : `${baseUrlCtb}/v1/transport/citybus-nwfb/stop/${stopId}`;
        try {
            const response = await fetch(url);
            if (response.ok) {
                const resData = await response.json(); const name = resData.data.name_tc || `巴士站 ${stopId}`;
                stopNameCache[cacheKey] = name; return name;
            }
        } catch (e) {}
        return `巴士站 ${stopId}`;
    }

    function getMinutesDiff(etaString) {
        if (!etaString) return null;
        
        let cleanEtaString = etaString;
        if (cleanEtaString.includes('.') && (cleanEtaString.includes('+') || cleanEtaString.toUpperCase().includes('Z'))) {
            cleanEtaString = cleanEtaString.replace(/\.\d+/, '');
        }

        const now = new Date(); 
        const etaTime = new Date(cleanEtaString);
        
        if (isNaN(etaTime.getTime())) {
            return null;
        }
        
        const diffMins = Math.floor((etaTime - now) / 1000 / 60);
        return diffMins < 0 ? 0 : diffMins;
    }

    function formatTime(etaString) {
        if (!etaString) return "暫無資料";
        
        let cleanEtaString = etaString;
        if (cleanEtaString.includes('.') && (cleanEtaString.includes('+') || cleanEtaString.toUpperCase().includes('Z'))) {
            cleanEtaString = cleanEtaString.replace(/\.\d+/, '');
        }
        
        const dateObj = new Date(cleanEtaString);
        if (isNaN(dateObj.getTime())) return "格式錯誤";
        
        return dateObj.toLocaleTimeString('zh-HK', { hour: '2-digit', minute: '2-digit', hour12: false });
    }

    async function fetchETA() {
        if (isEtaLoading) return;
        const container = document.getElementById('bus-container');
        const statusText = document.getElementById('update-time');
        isEtaLoading = true;
        container.innerHTML = `<div class="loading" style="grid-column: 1/-1;">🔄 正在獲取最新到站時間 (含小巴/巴士)...</div>`;

        const companyMeta = {
            'CTB': { name: '城巴 Citybus', icon: '🚌' },
            'NWFB': { name: '新巴 NWFB', icon: '🚌' },
            'KMB': { name: '九巴 KMB', icon: '🚌' },
            'MIB': { name: '專線小巴 GMB', icon: '🚐' }
        };

        try {
            const fetchPromises = busTargets.map(async (target) => {
                const dirText = target.direction === "outbound" ? "去程" : "回程";
                
                let url = '';
                if (target.company === 'MIB') {
                    url = `${baseUrlMib}/eta/route-stop/${target.routeId}/${target.stopValue}`;
                } else if (target.company === 'KMB') {
                    url = `${baseUrlKmb}/v1/transport/kmb/eta/${target.stopValue}/${target.route}/1`;
                } else {
                    url = `${baseUrlCtb}/v1/transport/citybus-nwfb/eta/${target.company}/${target.stopValue}/${target.route}`;
                }

                try {
                    const res = await fetch(url); if (!res.ok) throw new Error('連線失敗');
                    const resData = await res.json();
                    
                    let filteredEta = [];
                    let stopCleanName = target.stopName ? target.stopName.replace(/^\d+\.\s*\((.*)\)$/, '$1').replace(/^\d+\.\s*/, '') : `站點 ${target.stopValue}`;

                    if (target.company === 'MIB') {
                        if (resData.data && resData.data.length > 0 && resData.data[0].eta) {
                            filteredEta = resData.data[0].eta;
                        }
                    } else {
                        const etaArray = resData.data || [];
                        const dirCode = target.direction === "outbound" ? "O" : "I";
                        filteredEta = etaArray.filter(item => item.dir === dirCode);
                    }

                    const meta = companyMeta[target.company] || { name: target.company, icon: '🚌' };

                    let cardHtml = `
                        <div class="card">
                            <div class="card-header">
                                <div class="route-title-area">
                                    <div class="route-number">${meta.icon} ${target.route}</div>
                                    <div class="route-direction">${dirText}</div>
                                </div>
                                <div class="stop-info">📍 ${stopCleanName}</div>
                                <div class="stop-id-label">系統: ${meta.name} | ID: ${target.stopValue}</div>
                            </div>
                            <ul class="eta-list">
                    `;

                    if (filteredEta.length === 0) {
                        cardHtml += `<li class="eta-item" style="color: #999;">目前沒有預計班次</li>`;
                    } else {
                        filteredEta.forEach(info => {
                            const rawEtaTime = info.timestamp || info.eta; 
                            const dest = info.dest_tc || info.dest_en || '終點站';
                            
                            const mins = getMinutesDiff(rawEtaTime);
                            const formattedClock = formatTime(rawEtaTime);
                            
                            let timeDisplay = '';
                            let urgentClass = (mins !== null && mins <= 3) ? 'urgent' : '';

                            if (target.company === 'MIB' && info.remarks_tc) {
                                timeDisplay = `${mins} 分鐘 (${info.remarks_tc})`;
                            } else if (mins === 0) {
                                timeDisplay = '即將抵達';
                            } else if (mins !== null) {
                                timeDisplay = `${mins} 分鐘 (${formattedClock})`;
                            } else {
                                timeDisplay = '未有時間';
                            }

                            cardHtml += `
                                <li class="eta-item">
                                    <div class="destination">往 ${dest}</div>
                                    <div class="time-badge ${urgentClass}">${timeDisplay}</div>
                                </li>
                            `;
                        });
                    }

                    cardHtml += `</ul></div>`; return cardHtml;

                } catch (error) {
                    return `
                        <div class="card" style="border-top-color: var(--danger);">
                            <div class="card-header">
                                <div class="route-title-area"><div class="route-number">${target.route}</div></div>
                                <div class="stop-info">📍 站點 ID: ${target.stopValue}</div>
                            </div>
                            <p style="color: var(--danger); font-size:0.9rem; padding: 5px 0; margin: 0;">無法載入此路線數據。</p>
                        </div>
                    `;
                }
            });

            const htmlResultsArray = await Promise.all(fetchPromises);
            container.innerHTML = htmlResultsArray.length ? htmlResultsArray.join('') : '<div class="no-data" style="grid-column: 1/-1;">此設定檔內沒有任何路線。</div>';
            statusText.innerText = `最後更新時間: ${new Date().toLocaleTimeString('zh-HK', { hour12: false })}`;

        } catch (globalError) {
            container.innerHTML = `<div class="error" style="grid-column: 1/-1;">更新失敗，請稍後再試。</div>`;
        } finally {
            isEtaLoading = false; 
        }
    }

    async function manualRefresh() {
        const btn = document.getElementById('refresh-btn'); btn.classList.add('spinning'); btn.disabled = true;
        await fetchETA(); btn.classList.remove('spinning'); btn.disabled = false;
    }
    
    function renderETA(profileId) {
        currentProfileId = profileId; const elements = profiles[currentProfileId].elements;
        document.getElementById('profileSettingCard').style.display = 'none';
        document.getElementById('arrivalContainerCard').style.display = 'block';

        collapseProfiles(profiles[profileId].name + " (ETA)");
        busTargets.length = 0; 
        elements.forEach((element) => { try { busTargets.push(JSON.parse(element)); } catch(e) {} });
        
        fetchETA();
        if(autoRefreshTimer) clearInterval(autoRefreshTimer);
        autoRefreshTimer = setInterval(fetchETA, 30000);
    }
</script>
