<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>小氣簿</title>
  
  <link rel="icon" type="image/png" href="https://raw.githubusercontent.com/keliguru/sushiro-queue/refs/heads/main/littlegas-icon.png">
  <meta property="og:type" content="website">
  <meta property="og:title" content="小氣簿">
  <meta property="og:description" content="小氣簿">
  <meta property="og:image" content="https://raw.githubusercontent.com/keliguru/sushiro-queue/refs/heads/main/littlegas-icon.png"> 
  <link rel="apple-touch-icon" href="https://raw.githubusercontent.com/keliguru/sushiro-queue/refs/heads/main/littlegas-icon.png">

  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="小氣簿">
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;700&display=swap" rel="stylesheet">
  
  <style>
    :root {
      --bg-color: #FFF9E6;
      --card-bg: #FFFFFF;
      --border-color: #2B2D42;
      --primary: #FFD166;
      --secondary: #4ECDC4;
      --danger: #FF6B6B;
      --radius: 22px;
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    /* 防止手機全局橫向滑動/走位 */
    html, body {
      width: 100%;
      overflow-x: hidden;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Fredoka', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background-color: var(--bg-color);
      color: var(--border-color);
      padding: 16px 12px 40px 12px;
      display: flex;
      justify-content: center;
    }

    .mobile-container {
      width: 100%;
      max-width: 430px;
      display: flex;
      flex-direction: column;
      gap: 18px;
    }

    .header {
      text-align: center;
      padding: 10px 0 5px 0;
      width: 100%;
    }

    .header h1 {
      margin: 0;
      font-size: clamp(20px, 6vw, 26px);
      font-weight: 700;
      background: #FF6B6B;
      color: white;
      padding: 8px 18px;
      border-radius: 50px;
      border: 3.5px solid var(--border-color);
      box-shadow: 0 5px 0 var(--border-color);
      transform: rotate(-2deg);
      display: inline-block;
      max-width: 100%;
      word-break: break-word;
    }

    .cartoon-card {
      background: var(--card-bg);
      border: 3.5px solid var(--border-color);
      border-radius: var(--radius);
      box-shadow: 0 8px 0 var(--border-color);
      padding: 16px 14px;
      width: 100%;
    }

    .total-banner {
      background: var(--secondary);
      border: 3.5px solid var(--border-color);
      border-radius: 18px;
      box-shadow: 0 5px 0 var(--border-color);
      padding: 12px 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
    }

    .total-title { font-size: 15px; font-weight: 700; }
    .total-amount { 
      font-size: 24px; 
      font-weight: 700; 
      color: white; 
      text-shadow: 2px 2px 0 var(--border-color);
      word-break: break-all;
    }

    .form-group { 
      margin-bottom: 12px; 
      width: 100%;
    }
    .form-group label { display: block; font-size: 14px; font-weight: 700; margin-bottom: 6px; }

    .form-row { 
      display: flex; 
      gap: 10px; 
      width: 100%;
    }
    .form-row .form-group { 
      flex: 1; 
      min-width: 0; 
    }

    .cartoon-input {
      width: 100%;
      height: 46px;
      padding: 8px 12px;
      font-size: 16px;
      font-family: inherit;
      font-weight: 700;
      color: var(--border-color);
      background-color: #F8FAFC;
      border: 3px solid var(--border-color);
      border-radius: 14px;
      outline: none;
      box-shadow: inset 0 3px 0 rgba(0,0,0,0.06);
      -webkit-appearance: none;
      appearance: none;
    }

    .cartoon-input:focus {
      background-color: #FFFFFF;
      border-color: #4C6EF5;
    }

    /* 計算機風格金額顯示螢幕 */
    .calc-screen {
      text-align: right;
      font-size: 22px;
      background-color: #E8F5E9;
      color: #1B5E20;
      letter-spacing: 1px;
    }

    /* 計算機按鈕網格 */
    .calc-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
      margin-top: 6px;
      margin-bottom: 12px;
    }

    .calc-btn {
      height: 48px;
      font-size: 18px;
      font-family: inherit;
      font-weight: 700;
      color: var(--border-color);
      background-color: #FFFFFF;
      border: 3px solid var(--border-color);
      border-radius: 12px;
      box-shadow: 0 4px 0 var(--border-color);
      cursor: pointer;
      display: flex;
      justify-content: center;
      align-items: center;
      transition: all 0.05s ease;
      user-select: none;
    }

    .calc-btn:active {
      transform: translateY(2px);
      box-shadow: 0 2px 0 var(--border-color);
    }

    .calc-btn.op-btn {
      background-color: #E2E8F0;
    }

    .calc-btn.clear-btn {
      background-color: #FFD1D1;
      color: var(--danger);
    }

    .calc-btn.equal-btn {
      background-color: #A8DADC;
    }

    .btn-group { display: flex; gap: 8px; }

    .cartoon-btn {
      width: 100%;
      height: 52px;
      padding: 0 14px;
      font-size: 18px;
      font-family: inherit;
      font-weight: 700;
      color: var(--border-color);
      background-color: var(--primary);
      border: 3.5px solid var(--border-color);
      border-radius: 16px;
      box-shadow: 0 5px 0 var(--border-color);
      cursor: pointer;
      margin-top: 4px;
      transition: all 0.1s ease;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .cartoon-btn:active:not(:disabled) {
      transform: translateY(3px);
      box-shadow: 0 2px 0 var(--border-color);
    }

    .cartoon-btn.cancel-btn {
      background-color: #E2E8F0;
      flex: 0 0 75px;
    }

    .list-header { font-size: 18px; font-weight: 700; margin-bottom: 12px; }

    .item-list {
      list-style: none;
      padding: 0;
      margin: 0;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .item-card {
      background: #FFFFFF;
      border: 3px solid var(--border-color);
      border-radius: 16px;
      box-shadow: 0 4px 0 var(--border-color);
      padding: 12px 14px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      width: 100%;
    }

    .item-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      width: 100%;
    }

    .item-info { 
      display: flex; 
      flex-direction: column; 
      gap: 2px; 
      min-width: 0; 
      width: 100%;
    }
    
    .item-category { 
      font-size: 16px; 
      font-weight: 700; 
      word-break: break-word; 
    }
    
    .item-meta { 
      font-size: 12px; 
      font-weight: 500; 
      color: #64748B; 
      word-break: break-word; 
    }

    .item-bottom {
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-top: 2px dashed #E2E8F0;
      padding-top: 8px;
      flex-wrap: wrap;
      gap: 8px;
    }

    .item-amount-badge {
      background: #FFE3E3;
      color: var(--danger);
      border: 2px solid var(--border-color);
      border-radius: 12px;
      padding: 3px 10px;
      font-size: 16px;
      font-weight: 700;
      word-break: break-all;
    }

    .action-btns { 
      display: flex; 
      gap: 6px; 
      margin-left: auto;
    }

    .mini-btn {
      border: 2px solid var(--border-color);
      border-radius: 10px;
      padding: 5px 10px;
      font-size: 13px;
      font-family: inherit;
      font-weight: 700;
      cursor: pointer;
      box-shadow: 0 3px 0 var(--border-color);
      transition: all 0.1s;
    }

    .mini-btn:active {
      transform: translateY(2px);
      box-shadow: 0 1px 0 var(--border-color);
    }

    .edit-btn { background-color: #A8DADC; color: var(--border-color); }
    .delete-btn { background-color: #FF6B6B; color: white; }

    .loading-box { text-align: center; padding: 20px; font-weight: 700; color: #64748B; }
    .spinner {
      display: inline-block;
      width: 24px;
      height: 24px;
      border: 4px solid var(--border-color);
      border-radius: 50%;
      border-top-color: var(--primary);
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

<div class="mobile-container">
  
  <div class="header">
    <h1>✨ 我的小氣簿 📒</h1>
  </div>

  <!-- 新增/修改 表單 -->
  <div class="cartoon-card">
    <form id="expenseForm">
      <!-- 隱藏欄位：儲存當前修改的 ID -->
      <input type="hidden" id="editId" value="">
      <input type="hidden" id="editRowIndex" value="">

      <div class="form-row">
        <div class="form-group">
          <label for="date">📅 日期</label>
          <input type="date" id="date" class="cartoon-input" required>
        </div>
        <div class="form-group">
          <label for="category">🏷️ 項目/類別</label>
          <input type="text" id="category" class="cartoon-input" placeholder="不可不填" required>
        </div>
      </div>

      <div class="form-group">
        <label for="note">📝 備註</label>
        <input type="text" id="note" class="cartoon-input" placeholder="可不填">
      </div>

      <!-- 計算機面板區塊 -->
      <div class="form-group">
        <label for="amount">🧮 金額 ($)</label>
        <input type="text" id="amount" class="cartoon-input calc-screen" placeholder="0" readonly required>
      </div>

      <!-- 計算機按鈕盤 -->
      <div class="calc-grid">
        <button type="button" class="calc-btn clear-btn" onclick="clearCalc()">C</button>
        <button type="button" class="calc-btn clear-btn" onclick="backspaceCalc()">⌫</button>
        <button type="button" class="calc-btn op-btn" onclick="appendCalc('÷')">÷</button>
        <button type="button" class="calc-btn op-btn" onclick="appendCalc('×')">×</button>

        <button type="button" class="calc-btn" onclick="appendCalc('7')">7</button>
        <button type="button" class="calc-btn" onclick="appendCalc('8')">8</button>
        <button type="button" class="calc-btn" onclick="appendCalc('9')">9</button>
        <button type="button" class="calc-btn op-btn" onclick="appendCalc('-')">-</button>

        <button type="button" class="calc-btn" onclick="appendCalc('4')">4</button>
        <button type="button" class="calc-btn" onclick="appendCalc('5')">5</button>
        <button type="button" class="calc-btn" onclick="appendCalc('6')">6</button>
        <button type="button" class="calc-btn op-btn" onclick="appendCalc('+')">+</button>

        <button type="button" class="calc-btn" onclick="appendCalc('1')">1</button>
        <button type="button" class="calc-btn" onclick="appendCalc('2')">2</button>
        <button type="button" class="calc-btn" onclick="appendCalc('3')">3</button>
        <button type="button" class="calc-btn equal-btn" onclick="evaluateCalc()">=</button>

        <button type="button" class="calc-btn" onclick="appendCalc('0')">0</button>
        <button type="button" class="calc-btn" onclick="appendCalc('00')">00</button>
        <button type="button" class="calc-btn" onclick="appendCalc('.')">.</button>
        <button type="button" class="calc-btn op-btn" onclick="appendCalc('+')">+</button>
      </div>

      <div class="btn-group">
        <button type="button" id="cancelEditBtn" class="cartoon-btn cancel-btn" style="display:none;" onclick="resetForm()">取消</button>
        <button type="submit" id="submitBtn" class="cartoon-btn">
          <span>➕ 新增一筆紀錄</span>
        </button>
      </div>
    </form>
  </div>

  <!-- 總計看板 + 明細列表 -->
  <div class="cartoon-card">
    <div class="total-banner">
      <span class="total-title">💰 累積總支出</span>
      <span class="total-amount">$<span id="totalAmount">0</span></span>
    </div>

    <div class="list-header">📜 歷史明細</div>

    <div id="loading" class="loading-box">
      <div class="spinner"></div>
      <div>載入明細中...</div>
    </div>

    <ul id="itemList" class="item-list"></ul>
  </div>

</div>

<script>
  const GAS_WEB_APP_URL = "https://script.google.com/macros/s/AKfycbyPAd8GJhMvHthq1NE8MTiAXN1_cHmbj-_Og9tPGn2dSKSj_qP9QjO-5wN3uGrS5Y_-/exec";

  let currentRecords = [];

  document.getElementById('date').valueAsDate = new Date();
  document.addEventListener('DOMContentLoaded', fetchRecords);

  /* 計算機邏輯 */
  function appendCalc(val) {
    const amtInput = document.getElementById('amount');
    const ops = ['+', '-', '×', '÷'];
    const current = amtInput.value;

    if (current === '0' && !ops.includes(val) && val !== '.') {
      amtInput.value = val;
      return;
    }

    // 防止連續輸入多個運算符
    if (ops.includes(val) && ops.includes(current.slice(-1))) {
      amtInput.value = current.slice(0, -1) + val;
      return;
    }

    amtInput.value += val;
  }

  function clearCalc() {
    document.getElementById('amount').value = '';
  }

  function backspaceCalc() {
    const amtInput = document.getElementById('amount');
    amtInput.value = amtInput.value.slice(0, -1);
  }

  function evaluateCalc() {
    const amtInput = document.getElementById('amount');
    let expr = amtInput.value.trim();
    if (!expr) return;

    expr = expr.replace(/×/g, '*').replace(/÷/g, '/');

    try {
      // 僅允許數字與基本四則運算符，確保安全性
      if (/^[0-9+\-*/. ]+$/.test(expr)) {
        let res = Function('"use strict"; return (' + expr + ')')();
        if (!isNaN(res) && isFinite(res)) {
          // 四捨五入至小數第二位，避免浮點數誤差
          res = Math.round(res * 100) / 100;
          amtInput.value = res;
        }
      }
    } catch (err) {
      console.warn('計算錯誤:', err);
    }
  }

  async function fetchRecords() {
    const loadingEl = document.getElementById('loading');
    const listEl = document.getElementById('itemList');
    loadingEl.style.display = 'block';
    listEl.innerHTML = '';

    try {
      const response = await fetch(GAS_WEB_APP_URL);
      const resData = await response.json();

      if (resData.status === 'success') {
        currentRecords = resData.data || [];
        renderList(currentRecords);
      } else {
        alert('讀取失敗：' + resData.message);
      }
    } catch (err) {
      console.error(err);
      alert('連線失敗，請檢查網路。');
    } finally {
      loadingEl.style.display = 'none';
    }
  }

  function renderList(records) {
    const listEl = document.getElementById('itemList');
    const totalEl = document.getElementById('totalAmount');
    let total = 0;

    if (!records || records.length === 0) {
      listEl.innerHTML = '<li class="loading-box">目前沒有記帳紀錄喔！🎈</li>';
      totalEl.textContent = '0';
      return;
    }

    const sorted = [...records].reverse();

    sorted.forEach(item => {
      const amt = parseFloat(item.amount) || 0;
      total += amt;

      const li = document.createElement('li');
      li.className = 'item-card';
      li.innerHTML = `
        <div class="item-top">
          <div class="item-info">
            <div class="item-category">${escapeHtml(item.category)}</div>
            <div class="item-meta">🗓️ ${item.date} ${item.note ? '• ' + escapeHtml(item.note) : ''}</div>
          </div>
        </div>
        <div class="item-bottom">
          <div class="item-amount-badge">-$${amt.toLocaleString()}</div>
          <div class="action-btns">
            <button class="mini-btn edit-btn" onclick="startEdit('${item.id}', ${item.rowIndex})">✏️ 編輯</button>
            <button class="mini-btn delete-btn" onclick="deleteRecord('${item.id}', ${item.rowIndex})">🗑️ 刪除</button>
          </div>
        </div>
      `;
      listEl.appendChild(li);
    });

    totalEl.textContent = total.toLocaleString();
  }

  function startEdit(id, rowIndex) {
    const item = currentRecords.find(r => String(r.id) === String(id) || r.rowIndex === rowIndex);
    if (!item) return;

    document.getElementById('editId').value = item.id;
    document.getElementById('editRowIndex').value = item.rowIndex;
    document.getElementById('date').value = item.date;
    document.getElementById('category').value = item.category;
    document.getElementById('amount').value = item.amount;
    document.getElementById('note').value = item.note || '';

    document.getElementById('submitBtn').innerHTML = '<span>💾 儲存修改</span>';
    document.getElementById('cancelEditBtn').style.display = 'block';

    window.scrollTo({ top: 0, behavior: 'smooth' });
  }

  function resetForm() {
    document.getElementById('editId').value = '';
    document.getElementById('editRowIndex').value = '';
    document.getElementById('category').value = '';
    document.getElementById('amount').value = '';
    document.getElementById('note').value = '';
    document.getElementById('date').valueAsDate = new Date();

    document.getElementById('submitBtn').innerHTML = '<span>➕ 新增一筆紀錄</span>';
    document.getElementById('cancelEditBtn').style.display = 'none';
  }

  async function deleteRecord(id, rowIndex) {
    if (!confirm("確定要刪除這筆紀錄嗎？")) return;

    const payload = {
      action: 'delete',
      id: id,
      rowIndex: rowIndex
    };

    try {
      const response = await fetch(GAS_WEB_APP_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'text/plain;charset=utf-8' },
        body: JSON.stringify(payload)
      });

      const resData = await response.json();
      if (resData.status === 'success') {
        await fetchRecords();
      } else {
        alert('刪除失敗：' + resData.message);
      }
    } catch (err) {
      console.error(err);
      alert('刪除時發生錯誤');
    }
  }

  document.getElementById('expenseForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    
    // 送出前先執行計算
    evaluateCalc();

    const amtVal = document.getElementById('amount').value;
    if (!amtVal || isNaN(parseFloat(amtVal))) {
      alert('請先輸入有效金額！');
      return;
    }

    const btn = document.getElementById('submitBtn');
    const editId = document.getElementById('editId').value;
    const isEdit = Boolean(editId);

    btn.disabled = true;
    btn.innerHTML = '<span>⏳ 處理中...</span>';

    const payload = {
      action: isEdit ? 'edit' : 'add',
      id: editId,
      rowIndex: document.getElementById('editRowIndex').value,
      date: document.getElementById('date').value,
      category: document.getElementById('category').value,
      amount: amtVal,
      note: document.getElementById('note').value
    };

    try {
      const response = await fetch(GAS_WEB_APP_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'text/plain;charset=utf-8' },
        body: JSON.stringify(payload)
      });

      const resData = await response.json();
      if (resData.status === 'success') {
        resetForm();
        await fetchRecords();
      } else {
        alert('處理失敗：' + resData.message);
      }
    } catch (err) {
      console.error(err);
      alert('操作失敗，請稍後再試');
    } finally {
      btn.disabled = false;
      if (!isEdit) resetForm();
    }
  });

  function escapeHtml(str) {
    return String(str || '').replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
  }
</script>

</body>
</html>
