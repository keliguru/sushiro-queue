<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <link rel="icon" href="https://fav.farm/🅿️" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>香港智能錶位實時</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <style>
        .loader {
            border-top-color: #3b82f6;
            animation: spinner 1.5s linear infinite;
        }
        @keyframes spinner {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body class="bg-gray-100 text-gray-800 font-sans">

    <nav class="bg-slate-900 text-white shadow-md sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 py-3 flex justify-between items-center">
            <h1 class="text-xl font-bold flex items-center gap-2">
                <i class="fa-solid fa-square-p text-yellow-400"></i> 香港實時智能錶位導航
            </h1>
            <div class="flex gap-2">
                <button id="notify-auth-btn" class="bg-emerald-700 hover:bg-emerald-800 px-3 py-1.5 rounded-lg text-xs transition flex items-center gap-1 hidden">
                    <i class="fa-solid fa-bell"></i> 啟用空位通知
                </button>
                <button id="fav-toggle-btn" class="bg-slate-700 hover:bg-slate-800 px-3 py-1.5 rounded-lg text-xs transition flex items-center gap-1">
                    <i class="fa-solid fa-star text-amber-400"></i> <span id="fav-toggle-text">只看最愛街道</span>
                </button>
                <button id="clear-cache-btn" class="bg-slate-700 hover:bg-slate-800 px-3 py-1.5 rounded-lg text-xs transition">
                    <i class="fa-solid fa-trash-can"></i> 清除快取
                </button>
                <button id="refresh-btn" class="bg-blue-600 hover:bg-blue-700 px-3 py-1.5 rounded-lg text-sm transition flex items-center gap-1">
                    <i class="fa-solid fa-rotate" id="refresh-icon"></i> <span id="refresh-text">更新狀態</span>
                </button>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-4 py-6">
        
        <div class="bg-white rounded-xl shadow-sm p-4 mb-6 flex flex-col gap-4">
            <div class="flex flex-col md:flex-row gap-4 items-center justify-between">
                <div class="w-full md:w-1/3 relative">
                    <span class="absolute inset-y-0 left-0 flex items-center pl-3 text-gray-400">
                        <i class="fa-solid fa-magnifying-glass"></i>
                    </span>
                    <input type="text" id="search-input" placeholder="搜尋車位 ID、街道、地區..." class="w-full pl-10 pr-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
                </div>
                
                <!-- 地區篩選 -->
                <div class="w-full md:w-auto flex gap-2 overflow-x-auto pb-2 md:pb-0" id="region-filters">
                    <button class="region-filter-btn bg-blue-600 text-white px-4 py-1.5 rounded-full text-sm font-medium whitespace-nowrap" data-region="ALL">全部地區</button>
                    <button class="region-filter-btn bg-gray-200 text-gray-700 hover:bg-gray-300 px-4 py-1.5 rounded-full text-sm font-medium whitespace-nowrap" data-region="HONG KONG">香港島</button>
                    <button class="region-filter-btn bg-gray-200 text-gray-700 hover:bg-gray-300 px-4 py-1.5 rounded-full text-sm font-medium whitespace-nowrap" data-region="KOWLOON">九龍</button>
                    <button class="region-filter-btn bg-gray-200 text-gray-700 hover:bg-gray-300 px-4 py-1.5 rounded-full text-sm font-medium whitespace-nowrap" data-region="NEW TERRITORIES">新界</button>
                </div>
            </div>

            <!-- 新增：車型篩選按鈕群組 -->
            <div class="flex flex-wrap gap-2 pt-2 border-t border-gray-100 items-center">
                <span class="text-xs text-gray-400 self-center"><i class="fa-solid fa-car-side"></i> 許可車型:</span>
                <div id="vehicle-filters" class="flex flex-wrap gap-2 overflow-x-auto">
                    <button class="vehicle-filter-btn bg-indigo-600 text-white px-3 py-1 rounded-lg text-xs font-medium whitespace-nowrap transition" data-vehicle="ALL">全部車型</button>
                    <button class="vehicle-filter-btn bg-gray-100 text-gray-600 hover:bg-gray-200 px-3 py-1 rounded-lg text-xs font-medium whitespace-nowrap transition" data-vehicle="A">一般車輛</button>
                    <button class="vehicle-filter-btn bg-gray-100 text-gray-600 hover:bg-gray-200 px-3 py-1 rounded-lg text-xs font-medium whitespace-nowrap transition" data-vehicle="G">貨車專用</button>
                    <button class="vehicle-filter-btn bg-gray-100 text-gray-600 hover:bg-gray-200 px-3 py-1 rounded-lg text-xs font-medium whitespace-nowrap transition" data-vehicle="C">巴士/旅遊巴</button>
                </div>
            </div>

            <div id="fav-street-buttons-container" class="flex flex-wrap gap-2 pt-2 border-t border-gray-100 hidden">
                <span class="text-xs text-gray-400 self-center"><i class="fa-solid fa-tags"></i> 捷徑篩選:</span>
                <div id="fav-street-btns" class="flex flex-wrap gap-2 items-center"></div>
            </div>
        </div>

        <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center mb-4 text-xs text-gray-500 gap-1">
            <div>
                <p>實時數據對時: <span id="update-time" class="font-medium text-gray-700">未載入</span></p>
                <p id="cache-status-text" class="text-blue-500 mt-0.5"></p>
            </div>
            <p class="text-sm">符合條件錶位：顯示 <span id="displayed-count" class="font-semibold text-slate-800">0</span> / <span id="total-count" class="font-semibold text-blue-600">0</span> 個</p>
        </div>

        <div id="loading-view" class="flex flex-col items-center justify-center py-20">
            <div class="loader ease-linear rounded-full border-4 border-t-4 border-gray-200 h-12 w-12 mb-4"></div>
            <p id="loading-text" class="text-gray-500 text-sm">正在讀取全港智能錶位數據...</p>
        </div>

        <div id="parking-list" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 hidden">
        </div>

        <div id="infinite-scroll-trigger" class="w-full text-center py-8 text-sm text-gray-400 hidden">
            <i class="fa-solid fa-circle-notch animate-spin mr-1"></i> 正在載入更多車位...
        </div>
        <div id="all-loaded-text" class="w-full text-center py-8 text-sm text-gray-400 hidden">
            已經看完全部符合條件的車位 🎉
        </div>
    </main>

    <footer class="bg-gray-800 text-gray-400 text-center py-6 mt-12 text-sm">
        <p>© 2026 香港實時錶位. 資料來源：DATA.GOV.HK (運輸署)</p>
    </footer>

    <script>
        const SPACE_INFO_URL = 'https://resource.data.one.gov.hk/td/psiparkingspaces/spaceinfo/parkingspaces.csv';
        const STATUS_URL = 'https://resource.data.one.gov.hk/td/psiparkingspaces/occupancystatus/occupancystatus.csv';

        const PROXIES = [
            'https://api.allorigins.win/raw?url=',
            'https://corsproxy.io/?'
        ];

        const CACHE_KEY_INFO = 'hk_parking_info_csv';
        const CACHE_KEY_TIME = 'hk_parking_info_time';
        const CACHE_KEY_FAV_STREETS = 'hk_parking_fav_streets'; 
        const CACHE_EXPIRE_TIME = 86400000; 

        let rawInfoData = null;   
        let parkingData = [];     
        let currentRegion = 'ALL';
        let currentVehicleType = 'ALL'; // 新增：存放當前車型篩選狀態
        let currentSelectedStreet = 'ALL'; 
        let currentSearch = '';
        let showFavoritesOnly = false;
        
        let favStreets = JSON.parse(localStorage.getItem(CACHE_KEY_FAV_STREETS)) || [];
        let previousFavStatusMap = new Map(); 

        // 分頁與動態加載變數
        let filteredDataGlobal = []; // 存放當前篩選過後的完整陣列
        let itemsPerPage = 40;       // 每次加載的數量
        let currentPage = 1;         // 當前已加載的頁數

        document.addEventListener('DOMContentLoaded', initPage);
        document.getElementById('refresh-btn').addEventListener('click', () => fetchLiveStatus(true));
        document.getElementById('clear-cache-btn').addEventListener('click', clearCache);
        document.getElementById('search-input').addEventListener('input', handleSearch);
        document.getElementById('fav-toggle-btn').addEventListener('click', toggleFavoritesFilter);
        document.getElementById('notify-auth-btn').addEventListener('click', requestNotificationPermission);
        
        // 監聽滾動事件來觸發「向下拉顯示更多」
        window.addEventListener('scroll', handleWindowScroll);
        
        setupRegionFilters();
        setupVehicleFilters(); // 新增：初始化車型篩選監聽

        async function initPage() {
            toggleLoading(true);
            checkNotificationSupport();
            try {
                await loadBaseInfo();    
                await fetchLiveStatus(); 
                renderFavStreetButtons(); 
            } catch (err) {
                console.error(err);
                alert("初始化失敗，請檢查網路連線或嘗試清除快取。");
            } finally {
                toggleLoading(false);
            }
        }

        function checkNotificationSupport() {
            if ('Notification' in window) {
                const authBtn = document.getElementById('notify-auth-btn');
                if (Notification.permission !== 'granted') {
                    authBtn.classList.remove('hidden');
                }
            }
        }

        async function requestNotificationPermission() {
            if ('Notification' in window) {
                const permission = await Notification.requestPermission();
                if (permission === 'granted') {
                    alert('🔔 通知功能已成功啟用！當您最愛的街道有車位釋出時將會提醒您。');
                    document.getElementById('notify-auth-btn').classList.add('hidden');
                }
            }
        }

        async function fetchWithProxy(targetUrl, description) {
            try {
                const response = await fetch(targetUrl);
                if (response.ok) return await response.text();
            } catch (e) {
                console.warn(`直連失敗，啟用 Proxy 下載 ${description}...`);
            }

            for (let i = 0; i < PROXIES.length; i++) {
                const proxyUrl = `${PROXIES[i]}${encodeURIComponent(targetUrl)}`;
                try {
                    document.getElementById('loading-text').innerText = `正在透過代理 [${i+1}] 下載 ${description}...`;
                    const response = await fetch(proxyUrl);
                    if (response.ok) return await response.text();
                } catch (err) {
                    console.error(`Proxy [${i}] 失敗`);
                }
            }
            throw new Error(`無法獲取 ${description} 資料。`);
        }

        async function loadBaseInfo() {
            const cachedInfo = localStorage.getItem(CACHE_KEY_INFO);
            const cachedTime = localStorage.getItem(CACHE_KEY_TIME);
            const now = Date.now();

            if (cachedInfo && cachedTime && (now - cachedTime < CACHE_EXPIRE_TIME)) {
                document.getElementById('cache-status-text').innerText = "💡 靜態基本數據來自本地快取 (24小時內有效)";
                rawInfoData = Papa.parse(cachedInfo, { header: false, skipEmptyLines: true }).data;
                return;
            }

            const infoRes = await fetchWithProxy(SPACE_INFO_URL, '基本錶位清單');
            localStorage.setItem(CACHE_KEY_INFO, infoRes);
            localStorage.setItem(CACHE_KEY_TIME, now.toString());
            document.getElementById('cache-status-text').innerText = "💡 基本數據已成功更新並建立快取";
            rawInfoData = Papa.parse(infoRes, { header: false, skipEmptyLines: true }).data;
        }

        async function fetchLiveStatus(isManualClick = false) {
            if (isManualClick) {
                toggleLoading(true);
                document.getElementById('loading-text').innerText = "正在獲取最新官方實時狀態...";
            }

            try {
                const statusRes = await fetchWithProxy(STATUS_URL, '實時動態狀態');
                const statusParsed = Papa.parse(statusRes, { header: false, skipEmptyLines: true }).data;

                const statusMap = new Map();
                statusParsed.forEach((row, index) => {
                    if (index === 0) return; 
                    const spaceId = row[0];
                    if (spaceId) {
                        statusMap.set(spaceId.trim(), {
                            meterStatus: (row[1] || 'N').trim(),      
                            occupancyStatus: (row[2] || 'V').trim()  
                        });
                    }
                });

                parkingData = [];
                let currentFavSpaces = []; 

                rawInfoData.forEach((row, index) => {
                    if (index === 0) return; 
                    
                    const spaceId = row[1]; 
                    if (!spaceId || spaceId == "ParkingSpaceId") return;

                    const liveStatus = statusMap.get(spaceId.trim()) || { meterStatus: 'N', occupancyStatus: 'UNKNOWN' };
                    const streetName = (row[12] || row[11] || '未知街道').trim();

                    let displayRegion = '其他';
                    if(row[2] === 'HONG KONG') displayRegion = '香港島';
                    if(row[2] === 'KOWLOON') displayRegion = '九龍';
                    if(row[2] === 'NEW TERRITORIES') displayRegion = '新界';

                    const item = {
                        id: spaceId,
                        poleId: row[0],                                                                                                                                                                                                                                                                                                                                 
                        regionCode: (row[2] || '').trim(),                                                                                      
                        region: displayRegion,                                                                                                                                                                                                        
                        district: row[6] || row[5] || '未知地區',                                                                                                                                                                                                         
                        street: streetName, 
                        latitude: row[17],                                                                                                                                                                                                                                                                                          
                        longitude: row[18],                                                                                                                                                                                                                                                                                         
                        vehicleType: (row[19] || 'A').trim(),                                                                                                                                                                                                           
                        maxParkingPeriod: row[20] || '未明',              
                        meterStatus: liveStatus.meterStatus,       
                        occupancyStatus: liveStatus.occupancyStatus
                    };

                    parkingData.push(item);

                    if (favStreets.includes(streetName)) {
                        currentFavSpaces.push(item);
                    }
                });

                if (previousFavStatusMap.size > 0) {
                    checkFavSpacesStatusChange(currentFavSpaces);
                }

                previousFavStatusMap.clear();
                currentFavSpaces.forEach(space => {
                    previousFavStatusMap.set(space.id, space.occupancyStatus);
                });

                document.getElementById('update-time').innerText = new Date().toLocaleTimeString();
                
                // 初始化與刷新時重新渲染
                prepareAndRenderInitialCards();

            } catch (error) {
                console.error(error);
                alert("無法獲取實時狀態資訊。");
            } finally {
                if (isManualClick) toggleLoading(false);
            }
        }

        function checkFavSpacesStatusChange(currentFavSpaces) {
            let notifiedStreets = new Set();

            currentFavSpaces.forEach(space => {
                const oldStatus = previousFavStatusMap.get(space.id);
                if (oldStatus && oldStatus === 'O' && space.occupancyStatus === 'V' && space.meterStatus === 'N') {
                    if (!notifiedStreets.has(space.street)) {
                        notifiedStreets.add(space.street);
                        triggerNotification(space.street, space.district);
                    }
                }
            });
        }

        function triggerNotification(streetName, district) {
            const title = `🌟 最愛街道空位提示！`;
            const options = {
                body: `位於【${district} · ${streetName}】有智能錶位剛空出來了，請把握機會！`,
                icon: 'https://cdn-icons-png.flaticon.com/512/2991/2991201.png'
            };

            if ('Notification' in window && Notification.permission === 'granted') {
                new Notification(title, options);
            } else {
                alert(`🔔【狀態更新通知】\n${options.body}`);
            }
        }

        function renderFavStreetButtons() {
            const container = document.getElementById('fav-street-buttons-container');
            const btnsDiv = document.getElementById('fav-street-btns');
            
            if (favStreets.length === 0) {
                container.classList.add('hidden');
                currentSelectedStreet = 'ALL';
                return;
            }

            container.classList.remove('hidden');
            btnsDiv.innerHTML = '';

            const allFavActive = currentSelectedStreet === 'ALL' && !showFavoritesOnly;
            const allBtn = document.createElement('button');
            allBtn.className = `px-3 py-1 text-xs rounded-lg font-medium transition whitespace-nowrap shadow-sm ${allFavActive ? 'bg-blue-600 text-white font-bold' : 'bg-gray-200 text-gray-700 hover:bg-gray-300'}`;
            allBtn.innerText = "全部車位";
            allBtn.addEventListener('click', () => {
                currentSelectedStreet = 'ALL';
                if (showFavoritesOnly) {
                    toggleFavoritesFilter(); 
                } else {
                    updateFavStreetButtonStyles();
                    prepareAndRenderInitialCards();
                }
            });
            btnsDiv.appendChild(allBtn);

            favStreets.forEach(street => {
                const btn = document.createElement('button');
                btn.setAttribute('data-street', street);
                const isActive = currentSelectedStreet === street;
                btn.className = `street-filter-btn px-3 py-1 text-xs rounded-lg font-medium transition whitespace-nowrap flex items-center gap-1 ${isActive ? 'bg-amber-500 text-slate-950 font-bold' : 'bg-gray-100 text-gray-600 hover:bg-gray-200'}`;
                btn.innerHTML = `<i class="fa-solid fa-star text-amber-400"></i> ${street}`;
                
                btn.addEventListener('click', () => {
                    if (currentSelectedStreet === street) {
                        currentSelectedStreet = 'ALL'; 
                    } else {
                        currentSelectedStreet = street;
                    }
                    updateFavStreetButtonStyles();
                    prepareAndRenderInitialCards();
                });
                btnsDiv.appendChild(btn);
            });
        }

        function updateFavStreetButtonStyles() {
            const btns = document.querySelectorAll('.street-filter-btn');
            const btnsContainer = document.getElementById('fav-street-btns');
            const allBtn = btnsContainer.children[0]; 

            const allFavActive = currentSelectedStreet === 'ALL' && !showFavoritesOnly;

            if (allFavActive) {
                if(allBtn) allBtn.className = "px-3 py-1 text-xs rounded-lg font-bold transition whitespace-nowrap bg-blue-600 text-white";
                btns.forEach(b => {
                    b.className = "street-filter-btn px-3 py-1 text-xs rounded-lg font-medium transition whitespace-nowrap flex items-center gap-1 bg-gray-100 text-gray-600 hover:bg-gray-200";
                });
            } else {
                if(allBtn) allBtn.className = "px-3 py-1 text-xs rounded-lg font-medium transition whitespace-nowrap bg-gray-200 text-gray-700 hover:bg-gray-300";
                btns.forEach(b => {
                    const s = b.getAttribute('data-street');
                    if (s === currentSelectedStreet) {
                        b.className = "street-filter-btn px-3 py-1 text-xs rounded-lg font-bold transition whitespace-nowrap flex items-center gap-1 bg-amber-500 text-slate-950";
                    } else {
                        b.className = "street-filter-btn px-3 py-1 text-xs rounded-lg font-medium transition whitespace-nowrap flex items-center gap-1 bg-gray-100 text-gray-600 hover:bg-gray-200";
                    }
                });
            }
        }

        // 核心邏輯處理：做數據過濾與排序，並準備初始化分頁
        function prepareAndRenderInitialCards() {
            currentPage = 1; 
            const container = document.getElementById('parking-list');
            container.innerHTML = ''; // 清空舊卡片

            // 執行篩選
            filteredDataGlobal = parkingData.filter(item => {
			
                const matchRegion = (currentRegion === 'ALL' || item.regionCode === currentRegion);
                // 新增：比對車型篩選
                const matchVehicle = (currentVehicleType === 'ALL' || item.vehicleType === currentVehicleType);
                const matchSearch = (
                    item.id.toLowerCase().includes(currentSearch) ||
                    item.street.toLowerCase().includes(currentSearch) || 
                    item.district.toLowerCase().includes(currentSearch)
                );
                
                let matchFav = true;
                if (showFavoritesOnly) {
                    matchFav = favStreets.includes(item.street);
                }
                if (currentSelectedStreet !== 'ALL') {
                    matchFav = (item.street === currentSelectedStreet);
                }

                return matchRegion && matchVehicle && matchSearch && matchFav;
            });

            // 執行排序
            filteredDataGlobal.sort((a, b) => {
                const aFav = favStreets.includes(a.street) ? 1 : 0;
                const bFav = favStreets.includes(b.street) ? 1 : 0;
                if (aFav !== bFav) return bFav - aFav;

                const getOrder = (item) => {
                    if (item.meterStatus !== 'N') return 3; 
                    if (item.occupancyStatus === 'V') return 1; 
                    if (item.occupancyStatus === 'O') return 2; 
                    return 4;
                };
                return getOrder(a) - getOrder(b);
            });

            // 更新總計數量顯示
            document.getElementById('total-count').innerText = filteredDataGlobal.length;

            if (filteredDataGlobal.length === 0) {
                container.innerHTML = `<div class="col-span-full text-center py-10 text-gray-400">找不到符合條件的錶位</div>`;
                document.getElementById('displayed-count').innerText = "0";
                document.getElementById('infinite-scroll-trigger').classList.add('hidden');
                document.getElementById('all-loaded-text').classList.add('hidden');
                return;
            }

            // 渲染第一頁
            appendCardsPage();
        }

        // 負責追加新一頁的卡片到畫面上
        function appendCardsPage() {
            const container = document.getElementById('parking-list');
            
            // 計算這次加載的範圍限制
            const startIndex = (currentPage - 1) * itemsPerPage;
            const endIndex = Math.min(startIndex + itemsPerPage, filteredDataGlobal.length);
            
            const pageData = filteredDataGlobal.slice(startIndex, endIndex);

            pageData.forEach(item => {
                let occText = '', occClass = '';
                let meterText = '', meterClass = '';
                let isUsable = item.meterStatus === 'N'; 
                const isStreetFaved = favStreets.includes(item.street);

                if (!isUsable) {
                    occText = '<i class="fa-solid fa-ban"></i> 暫停服務';
                    occClass = 'bg-gray-100 text-gray-400 border-gray-200';
                } else if (item.occupancyStatus === 'V') {
                    occText = '<i class="fa-solid fa-circle-check"></i> 有空位 (Vacant)';
                    occClass = 'bg-green-50 text-green-700 border-green-200';
                } else if (item.occupancyStatus === 'O') {
                    occText = '<i class="fa-solid fa-car"></i> 已被佔用 (Occupied)';
                    occClass = 'bg-rose-50 text-rose-700 border-rose-200';
                } else {
                    occText = '未知';
                    occClass = 'bg-gray-50 text-gray-500 border-gray-200';
                }

                if (item.meterStatus === 'N') {
                    meterText = '<i class="fa-solid fa-check-to-slot"></i> 正常服務 (Normal)';
                    meterClass = 'bg-blue-50 text-blue-700 border-blue-200';
                } else if (item.meterStatus === 'NU') {
                    meterText = '<i class="fa-solid fa-triangle-exclamation"></i> 暫停使用 (Not for Use)';
                    meterClass = 'bg-amber-100 text-amber-800 border-amber-300 animate-pulse';
                }

                let vehicleTypeDesc = '';
                let vehicleIcon = '';
                if (item.vehicleType === 'G') {
                    vehicleTypeDesc = '貨車專用位 (Goods Vehicles Only)';
                    vehicleIcon = '<i class="fa-solid fa-truck text-amber-600"></i>';
                } else if (item.vehicleType === 'C') {
                    vehicleTypeDesc = '巴士/旅遊巴位 (Coaches Only)';
                    vehicleIcon = '<i class="fa-solid fa-bus text-indigo-600"></i>';
                } else {
                    vehicleTypeDesc = '一般車輛 (Any Vehicles)';
                    vehicleIcon = '<i class="fa-solid fa-car text-blue-600"></i>';
                }

                const mapsUrl = `https://www.google.com/maps/search/?api=1&query=${item.latitude},${item.longitude}`;

                let periodBadge = '';
                if (item.maxParkingPeriod.includes('120')) {
                    periodBadge = '<span class="bg-amber-500 text-white text-xs px-2 py-0.5 rounded font-bold">2小時錶</span>';
                } else if (item.maxParkingPeriod.includes('60')) {
                    periodBadge = '<span class="bg-red-500 text-white text-xs px-2 py-0.5 rounded font-bold">1小時錶</span>';
                } else if (item.maxParkingPeriod.includes('30')) {
                    periodBadge = '<span class="bg-blue-500 text-white text-xs px-2 py-0.5 rounded font-bold">30分鐘錶</span>';
                } else {
                    periodBadge = `<span class="bg-slate-600 text-white text-xs px-2 py-0.5 rounded font-bold">${item.maxParkingPeriod}</span>`;
                }

                const cardHtml = `
                    <div class="bg-white rounded-xl shadow-sm hover:shadow-md transition overflow-hidden border ${!isUsable ? 'border-gray-200 opacity-70' : 'border-gray-200'} flex flex-col justify-between">
                        <div class="p-5">
                            <div class="mb-3 flex justify-between items-center">
                                <span class="bg-slate-100 text-slate-700 text-xs font-semibold px-2.5 py-0.5 rounded border border-slate-200">
                                    ${item.region} · ${item.district}
                                </span>
                                <div class="flex gap-1.5 items-center">
                                    ${periodBadge}
                                    <button onclick="toggleFavoriteStreet('${encodeURIComponent(item.street)}')" class="text-lg focus:outline-none p-1 hover:scale-110 transition" title="收藏/取消收藏整條街道">
                                        <i class="${isStreetFaved ? 'fa-solid fa-star text-amber-400' : 'fa-regular fa-star text-gray-300'}"></i>
                                    </button>
                                </div>
                            </div>

                            <h3 class="text-2xl font-black text-slate-800 tracking-tight mb-1">
                                ${item.id}
                            </h3>
                            <p class="text-gray-700 font-bold text-sm mb-1"><i class="fa-solid fa-location-dot text-gray-400 text-xs mr-1"></i>${item.street}</p>
                            <p class="text-gray-400 text-xs mb-4">柱號: ${item.poleId}</p>
                            
                            <div class="space-y-2 mb-4">
                                <div class="text-xs font-semibold px-3 py-2 rounded-lg border flex justify-between items-center ${meterClass}">
                                    <span>錶柱運作狀態：</span>
                                    <span>${meterText}</span>
                                </div>
                                <div class="text-xs font-semibold px-3 py-2 rounded-lg border flex justify-between items-center ${occClass}">
                                    <span>車位實時空置：</span>
                                    <span>${occText}</span>
                                </div>
                            </div>

                            <div class="text-gray-700 text-xs bg-slate-50 p-2.5 rounded border border-slate-100 flex items-start gap-2">
                                <div class="mt-0.5">${vehicleIcon}</div>
                                <div>
                                    <span class="font-bold block mb-0.5">許可車型 (${item.vehicleType})</span>
                                    <span class="text-gray-500">${vehicleTypeDesc}</span>
                                </div>
                            </div>
                        </div>

                        <div class="bg-slate-50 px-5 py-3 border-t border-gray-100 flex justify-between items-center text-xs text-gray-500">
                            <span><i class="fa-solid fa-signal ${isUsable ? 'text-green-500 animate-pulse' : 'text-gray-300'}"></i> 訊號對接</span>
                            <a href="${mapsUrl}" target="_blank" class="text-blue-600 hover:underline font-semibold flex items-center gap-1 bg-white border border-gray-200 shadow-sm px-3 py-1 rounded-md hover:bg-blue-50 transition text-sm">
                                <i class="fa-solid fa-map-location-dot"></i> 地圖導航
                            </a>
                        </div>
                    </div>
                `;
                container.insertAdjacentHTML('beforeend', cardHtml);
            });

            // 更新當前顯示的數量進度
            document.getElementById('displayed-count').innerText = endIndex;

            // 控制底部滾動提示與完成狀態
            const scrollTrigger = document.getElementById('infinite-scroll-trigger');
            const allLoadedText = document.getElementById('all-loaded-text');
            
            if (endIndex < filteredDataGlobal.length) {
                scrollTrigger.classList.remove('hidden');
                allLoadedText.classList.add('hidden');
            } else {
                scrollTrigger.classList.add('hidden');
                // 如果總共數據本來就少於一頁（例如只有幾個最愛車位），不特別秀「看完了」提示以免干擾畫面
                if (filteredDataGlobal.length > itemsPerPage) {
                    allLoadedText.classList.remove('hidden');
                } else {
                    allLoadedText.classList.add('hidden');
                }
            }
        }

        // 視窗滾動偵測
        function handleWindowScroll() {
            // 如果加載層正在轉、或者當前根本沒有篩選數據，就不重複觸發
            if (filteredDataGlobal.length === 0) return;

            const scrollTrigger = document.getElementById('infinite-scroll-trigger');
            if (scrollTrigger.classList.contains('hidden')) return; // 已經全部加載完就不再觸發

            // 當滾動到距離底部小於 200px 時，自動加載下一頁
            if ((window.innerHeight + window.scrollY) >= document.documentElement.scrollHeight - 200) {
                currentPage++;
                appendCardsPage();
            }
        }

        window.toggleFavoriteStreet = function(encodedStreet) {
            const street = decodeURIComponent(encodedStreet);
            const index = favStreets.indexOf(street);
            if (index > -1) {
                favStreets.splice(index, 1); 
                if (currentSelectedStreet === street) currentSelectedStreet = 'ALL';
            } else {
                favStreets.push(street);     
            }
            localStorage.setItem(CACHE_KEY_FAV_STREETS, JSON.stringify(favStreets));
            
            renderFavStreetButtons(); 
            prepareAndRenderInitialCards();
        }

        function toggleFavoritesFilter() {
            showFavoritesOnly = !showFavoritesOnly;
            const btn = document.getElementById('fav-toggle-btn');
            const text = document.getElementById('fav-toggle-text');
            if (showFavoritesOnly) {
                btn.classList.remove('bg-slate-700', 'hover:bg-slate-800');
                btn.classList.add('bg-amber-500', 'hover:bg-amber-600', 'text-slate-900');
                text.innerText = "顯示全部車位";
                currentSelectedStreet = 'ALL';
            } else {
                btn.classList.remove('bg-amber-500', 'hover:bg-amber-600', 'text-slate-900');
                btn.classList.add('bg-slate-700', 'hover:bg-slate-800', 'text-white');
                text.innerText = "只看最愛街道";
            }
            if(favStreets.length > 0) {
                updateFavStreetButtonStyles();
            }
            prepareAndRenderInitialCards();
        }

        function clearCache() {
            localStorage.removeItem(CACHE_KEY_INFO);
            localStorage.removeItem(CACHE_KEY_TIME);
            alert("本地基本資料快取已清除！");
            window.location.reload();
        }

        function handleSearch(e) {
            currentSearch = e.target.value.toLowerCase().trim();
            prepareAndRenderInitialCards();
        }

        function setupRegionFilters() {
            const buttons = document.querySelectorAll('.region-filter-btn');
            buttons.forEach(btn => {
                btn.addEventListener('click', (e) => {
                    buttons.forEach(b => {
                        b.classList.remove('bg-blue-600', 'text-white');
                        b.classList.add('bg-gray-200', 'text-gray-700', 'hover:bg-gray-300');
                    });
                    e.target.classList.remove('bg-gray-200', 'text-gray-700', 'hover:bg-gray-300');
                    e.target.classList.add('bg-blue-600', 'text-white');
                    currentRegion = e.target.getAttribute('data-region');
                    prepareAndRenderInitialCards();
                });
            });
        }

        // 新增：設定車型篩選按鈕點擊監聽與樣式切換邏輯
        function setupVehicleFilters() {
            const buttons = document.querySelectorAll('.vehicle-filter-btn');
            buttons.forEach(btn => {
                btn.addEventListener('click', (e) => {
                    buttons.forEach(b => {
                        b.classList.remove('bg-indigo-600', 'text-white');
                        b.classList.add('bg-gray-100', 'text-gray-600', 'hover:bg-gray-200');
                    });
                    e.target.classList.remove('bg-gray-100', 'text-gray-600', 'hover:bg-gray-200');
                    e.target.classList.add('bg-indigo-600', 'text-white');
                    currentVehicleType = e.target.getAttribute('data-vehicle');
                    prepareAndRenderInitialCards();
                });
            });
        }

        function toggleLoading(isLoading) {
            const loader = document.getElementById('loading-view');
            const list = document.getElementById('parking-list');
            const icon = document.getElementById('refresh-icon');
            if (isLoading) {
                loader.classList.remove('hidden');
                list.classList.add('hidden');
                icon.classList.add('fa-spin');
            } else {
                loader.classList.add('hidden');
                list.classList.remove('hidden');
                icon.classList.remove('fa-spin');
            }
        }
    </script>
</body>
</html>
