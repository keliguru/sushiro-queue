<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <link rel="icon" href="https://fav.farm/🅿️" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>香港智能錶位實時導航</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <style>
        .loader {
            border-top-color: #3b82f6;
            animation: spinner 1.5s linear infinite;
        }
        @keyframes spinner {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        ::-webkit-scrollbar {
            height: 4px;
            width: 4px;
        }
        ::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 4px;
        }
    </style>
</head>
<body class="bg-gray-100 text-gray-800 font-sans antialiased">

    <nav class="bg-slate-900 text-white shadow-md sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-3 py-2.5 flex flex-wrap justify-between items-center gap-2">
            <h1 class="text-base sm:text-xl font-bold flex items-center gap-2">
                <i class="fa-solid fa-square-p text-yellow-400"></i> 香港實時智能錶位
            </h1>
            <div class="flex items-center gap-1.5 flex-wrap">
                <button id="notify-auth-btn" class="bg-emerald-700 hover:bg-emerald-800 px-2.5 py-1.5 rounded-lg text-xs transition flex items-center gap-1 hidden">
                    <i class="fa-solid fa-bell"></i> <span class="hidden sm:inline">啟用</span>通知
                </button>
                <button id="fav-toggle-btn" class="bg-slate-700 hover:bg-slate-800 px-2.5 py-1.5 rounded-lg text-xs transition flex items-center gap-1">
                    <i class="fa-solid fa-star text-amber-400"></i> <span id="fav-toggle-text">最愛</span>
                </button>
                <button id="clear-cache-btn" class="bg-slate-700 hover:bg-slate-800 px-2.5 py-1.5 rounded-lg text-xs transition" title="清除快取">
                    <i class="fa-solid fa-trash-can"></i>
                </button>
                <button id="refresh-btn" class="bg-blue-600 hover:bg-blue-700 px-2.5 py-1.5 rounded-lg text-xs sm:text-sm transition flex items-center gap-1">
                    <i class="fa-solid fa-rotate" id="refresh-icon"></i> <span>更新</span>
                </button>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-3 sm:px-4 py-4 sm:py-6">
        
        <div class="bg-white rounded-xl shadow-sm p-3 sm:p-4 mb-4 flex flex-col gap-3">
            <div class="flex flex-col md:flex-row gap-3 items-center justify-between">
                <div class="w-full md:w-1/3 relative">
                    <span class="absolute inset-y-0 left-0 flex items-center pl-3 text-gray-400">
                        <i class="fa-solid fa-magnifying-glass"></i>
                    </span>
                    <input type="text" id="search-input" placeholder="搜尋 ID、街道、地區..." class="w-full pl-10 pr-4 py-2 text-sm border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
                </div>
                
                <div class="w-full md:w-auto flex gap-1.5 overflow-x-auto pb-1 md:pb-0" id="region-filters">
                    <button class="region-filter-btn bg-blue-600 text-white px-3 py-1.5 rounded-full text-xs sm:text-sm font-medium whitespace-nowrap" data-region="ALL">全部地區</button>
                    <button class="region-filter-btn bg-gray-200 text-gray-700 hover:bg-gray-300 px-3 py-1.5 rounded-full text-xs sm:text-sm font-medium whitespace-nowrap" data-region="HONG KONG">香港島</button>
                    <button class="region-filter-btn bg-gray-200 text-gray-700 hover:bg-gray-300 px-3 py-1.5 rounded-full text-xs sm:text-sm font-medium whitespace-nowrap" data-region="KOWLOON">九龍</button>
                    <button class="region-filter-btn bg-gray-200 text-gray-700 hover:bg-gray-300 px-3 py-1.5 rounded-full text-xs sm:text-sm font-medium whitespace-nowrap" data-region="NEW TERRITORIES">新界</button>
                </div>
            </div>

            <div class="flex flex-wrap gap-2 pt-2 border-t border-gray-100 items-center">
                <span class="text-xs text-gray-400 self-center"><i class="fa-solid fa-car-side"></i> 車型:</span>
                <div id="vehicle-filters" class="flex flex-wrap gap-1.5 overflow-x-auto">
                    <button class="vehicle-filter-btn bg-indigo-600 text-white px-2.5 py-1 rounded-lg text-xs font-medium whitespace-nowrap transition" data-vehicle="ALL">全部車型</button>
                    <button class="vehicle-filter-btn bg-gray-100 text-gray-600 hover:bg-gray-200 px-2.5 py-1 rounded-lg text-xs font-medium whitespace-nowrap transition" data-vehicle="A">一般</button>
                    <button class="vehicle-filter-btn bg-gray-100 text-gray-600 hover:bg-gray-200 px-2.5 py-1 rounded-lg text-xs font-medium whitespace-nowrap transition" data-vehicle="G">貨車</button>
                    <button class="vehicle-filter-btn bg-gray-100 text-gray-600 hover:bg-gray-200 px-2.5 py-1 rounded-lg text-xs font-medium whitespace-nowrap transition" data-vehicle="C">巴士</button>
                </div>
            </div>

            <div id="fav-street-buttons-container" class="flex flex-wrap gap-2 pt-2 border-t border-gray-100 hidden">
                <span class="text-xs text-gray-400 self-center"><i class="fa-solid fa-tags"></i> 捷徑:</span>
                <div id="fav-street-btns" class="flex flex-wrap gap-1.5 items-center"></div>
            </div>
        </div>

        <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center mb-3 text-xs text-gray-500 gap-1 px-1">
            <div>
                <p>對時: <span id="update-time" class="font-medium text-gray-700">未載入</span></p>
                <p id="cache-status-text" class="text-blue-500 mt-0.5"></p>
            </div>
            <p class="text-xs sm:text-sm">符合錶位：<span id="displayed-count" class="font-semibold text-slate-800">0</span> / <span id="total-count" class="font-semibold text-blue-600">0</span></p>
        </div>

        <div id="loading-view" class="flex flex-col items-center justify-center py-16">
            <div class="loader ease-linear rounded-full border-4 border-t-4 border-gray-200 h-10 w-10 mb-3"></div>
            <p id="loading-text" class="text-gray-500 text-xs sm:text-sm text-center px-4">正在透過代理讀取全港智能錶位數據...</p>
        </div>

        <div id="parking-list" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4 sm:gap-6 hidden">
        </div>

        <div id="infinite-scroll-trigger" class="w-full text-center py-6 text-xs sm:text-sm text-gray-400 hidden">
            <i class="fa-solid fa-circle-notch animate-spin mr-1"></i> 正在載入更多車位...
        </div>
        <div id="all-loaded-text" class="w-full text-center py-6 text-xs sm:text-sm text-gray-400 hidden">
            已經看完全部符合條件的車位 🎉
        </div>
    </main>

    <footer class="bg-gray-800 text-gray-400 text-center py-5 mt-8 text-xs">
        <p>© 2026 香港實時錶位. 資料來源：DATA.GOV.HK (運輸署)</p>
    </footer>

    <script>
        const SPACE_INFO_URL = 'https://resource.data.one.gov.hk/td/psiparkingspaces/spaceinfo/parkingspaces.csv';
        const STATUS_URL = 'https://resource.data.one.gov.hk/td/psiparkingspaces/occupancystatus/occupancystatus.csv';

        const PROXIES = [
            ''
        ];

        const CACHE_KEY_INFO = 'hk_parking_info_csv';
        const CACHE_KEY_TIME = 'hk_parking_info_time';
        const CACHE_KEY_FAV_STREETS = 'hk_parking_fav_streets'; 
        const CACHE_EXPIRE_TIME = 86400000; 

        let rawInfoData = null;   
        let parkingData = [];     
        let currentRegion = 'ALL';
        let currentVehicleType = 'ALL';
        let currentSelectedStreet = 'ALL'; 
        let currentSearch = '';
        let showFavoritesOnly = false;
        
        let favStreets = JSON.parse(localStorage.getItem(CACHE_KEY_FAV_STREETS)) || [];

        let filteredDataGlobal = []; 
        let itemsPerPage = 30;       
        let currentPage = 1;         

        document.addEventListener('DOMContentLoaded', initPage);
        document.getElementById('refresh-btn').addEventListener('click', () => fetchLiveStatus(true));
        document.getElementById('clear-cache-btn').addEventListener('click', clearCache);
        document.getElementById('search-input').addEventListener('input', handleSearch);
        document.getElementById('fav-toggle-btn').addEventListener('click', toggleFavoritesFilter);
        document.getElementById('notify-auth-btn').addEventListener('click', requestNotificationPermission);
        
        window.addEventListener('scroll', handleWindowScroll);
        
        setupRegionFilters();
        setupVehicleFilters();

        async function initPage() {
            toggleLoading(true);
            checkNotificationSupport();
            try {
                alert("start loadbase")
                await loadBaseInfo(); 
                alert("pass loadbase")
                await fetchLiveStatus(); 
                alert("pass live status")
                renderFavStreetButtons(); 
                alert("alert pass button")
            } catch (err) {
                console.error(err);
                alert(err)
                alert("初始化失敗，行動網路連線較慢或被攔截，請點擊「更新狀態」或「清除快取」重試。");
            } finally {
                toggleLoading(false);
            }
        }

        function checkNotificationSupport() {
            if ('Notification' in window) {
                const authBtn = document.getElementById('notify-auth-btn');
                if (Notification.permission !== 'granted') {
                    authBtn.classList.remove('hidden');
                }
            }
        }

        async function requestNotificationPermission() {
            if ('Notification' in window) {
                const permission = await Notification.requestPermission();
                if (permission === 'granted') {
                    alert('🔔 通知功能已成功啟用！');
                    document.getElementById('notify-auth-btn').classList.add('hidden');
                }
            }
        }

        async function fetchWithProxy(targetUrl, description) {
            try {
                const controller = new AbortController();
                const timeoutId = setTimeout(() => controller.abort(), 6000);
                const response = await fetch(targetUrl, { signal: controller.signal });
                clearTimeout(timeoutId);
                if (response.ok) return await response.text();
            } catch (e) {
                console.warn(`直連失敗，切換代理下載 ${description}...`);
            }

            for (let i = 0; i < PROXIES.length; i++) {
                const proxyUrl = `${PROXIES[i]}${encodeURIComponent(targetUrl)}`;
                try {
                    const el = document.getElementById('loading-text');
                    if(el) el.innerText = `正在透過行動代理 [${i+1}] 下載 ${description}...`;
                    
                    const controller = new AbortController();
                    const timeoutId = setTimeout(() => controller.abort(), 8000);
                    const response = await fetch(proxyUrl, { signal: controller.signal });
                    clearTimeout(timeoutId);
                    
                    if (response.ok) return await response.text();
                } catch (err) {
                    console.error(`Proxy [${i}] 失敗`, err);
                }
            }
            throw new Error(`無法獲取 ${description} 資料。`);
        }

        async function loadBaseInfo() {
            const cachedInfo = localStorage.getItem(CACHE_KEY_INFO);
            const cachedTime = localStorage.getItem(CACHE_KEY_TIME);
            const now = Date.now();

            if (cachedInfo && cachedTime && (now - cachedTime < CACHE_EXPIRE_TIME)) {
                const statusEl = document.getElementById('cache-status-text');
                if(statusEl) statusEl.innerText = "💡 基本數據來自快取";
                rawInfoData = Papa.parse(cachedInfo, { header: false, skipEmptyLines: true }).data;
                return;
            }
            alert("start get api")

            const infoRes = await fetchWithProxy(SPACE_INFO_URL, '基本錶位清單');
            alert("finish get api")
            
            localStorage.setItem(CACHE_KEY_INFO, infoRes);
            localStorage.setItem(CACHE_KEY_TIME, now.toString());

            alert("after localstorage")
            const statusEl = document.getElementById('cache-status-text');
            if(statusEl) statusEl.innerText = "💡 基本數據已更新";
            rawInfoData = Papa.parse(infoRes, { header: false, skipEmptyLines: true }).data;
        }

        async function fetchLiveStatus(isManualClick = false) {
            if (isManualClick) {
                toggleLoading(true);
                const textEl = document.getElementById('loading-text');
                if(textEl) textEl.innerText = "正在獲取最新官方實時狀態...";
            }

            try {
                const statusRes = await fetchWithProxy(STATUS_URL, '實時動態狀態');
                const statusParsed = Papa.parse(statusRes, { header: false, skipEmptyLines: true }).data;

                const statusMap = new Map();
                statusParsed.forEach((row, index) => {
                    if (index === 0) return; 
                    const spaceId = row[0];
                    if (spaceId) {
                        statusMap.set(spaceId.trim(), {
                            meterStatus: (row[1] || 'N').trim(),      
                            occupancyStatus: (row[2] || 'V').trim()  
                        });
                    }
                });

                parkingData = [];
                let currentFavSpaces = []; 

                rawInfoData.forEach((row, index) => {
                    if (index === 0) return; 
                    const spaceId = row[1]; 
                    if (!spaceId || spaceId == "ParkingSpaceId") return;

                    const liveStatus = statusMap.get(spaceId.trim()) || { meterStatus: 'N', occupancyStatus: 'UNKNOWN' };
                    const streetName = (row[12] || row[11] || '未知街道').trim();

                    let displayRegion = '其他';
                    if(row[2] === 'HONG KONG') displayRegion = '港島';
                    else if(row[2] === 'NEW TERRITORIES') displayRegion = '新界';
                    else if(row[2] === 'KOWLOON') displayRegion = '九龍';

                    const item = {
                        id: spaceId,
                        poleId: row[0],                                                                                                                                                                                                                                                                                                                                 
                        regionCode: (row[2] || '').trim(),                                                                                      
                        region: displayRegion,                                                                                                                                                                                                        
                        district: row[6] || row[5] || '未知地區',                                                                                                                                                                                                         
                        street: streetName, 
                        latitude: row[17],                                                                                                                                                                                                                                                                                          
                        longitude: row[18],                                                                                                                                                                                                                                                                                         
                        vehicleType: (row[19] || 'A').trim(),                                                                                                                                                                                                           
                        maxParkingPeriod: row[20] || '未明',              
                        meterStatus: liveStatus.meterStatus,       
                        occupancyStatus: liveStatus.occupancyStatus
                    };

                    parkingData.push(item);

                    if (favStreets.includes(streetName)) {
                        currentFavSpaces.push(item);
                    }
                });

                const timeEl = document.getElementById('update-time');
                if(timeEl) timeEl.innerText = new Date().toLocaleTimeString();
                
                prepareAndRenderInitialCards();

            } catch (error) {
                console.error(error);
                alert("無法獲取實時狀態資訊，請點擊更新按鈕再試。");
            } finally {
                if (isManualClick) toggleLoading(false);
            }
        }

        function renderFavStreetButtons() {
            const container = document.getElementById('fav-street-buttons-container');
            const btnsDiv = document.getElementById('fav-street-btns');
            
            if (favStreets.length === 0) {
                container.classList.add('hidden');
                currentSelectedStreet = 'ALL';
                return;
            }

            container.classList.remove('hidden');
            btnsDiv.innerHTML = '';

            const allFavActive = currentSelectedStreet === 'ALL' && !showFavoritesOnly;
            const allBtn = document.createElement('button');
            allBtn.className = `px-2.5 py-1 text-xs rounded-lg font-medium transition whitespace-nowrap shadow-sm ${allFavActive ? 'bg-blue-600 text-white font-bold' : 'bg-gray-200 text-gray-700 hover:bg-gray-300'}`;
            allBtn.innerText = "全部";
            allBtn.addEventListener('click', () => {
                currentSelectedStreet = 'ALL';
                if (showFavoritesOnly) {
                    toggleFavoritesFilter(); 
                } else {
                    updateFavStreetButtonStyles();
                    prepareAndRenderInitialCards();
                }
            });
            btnsDiv.appendChild(allBtn);

            favStreets.forEach(street => {
                const btn = document.createElement('button');
                btn.setAttribute('data-street', street);
                const isActive = currentSelectedStreet === street;
                btn.className = `street-filter-btn px-2.5 py-1 text-xs rounded-lg font-medium transition whitespace-nowrap flex items-center gap-1 ${isActive ? 'bg-amber-500 text-slate-950 font-bold' : 'bg-gray-100 text-gray-600 hover:bg-gray-200'}`;
                btn.innerHTML = `<i class="fa-solid fa-star text-amber-400"></i> ${street}`;
                
                btn.addEventListener('click', () => {
                    currentSelectedStreet = (currentSelectedStreet === street) ? 'ALL' : street;
                    updateFavStreetButtonStyles();
                    prepareAndRenderInitialCards();
                });
                btnsDiv.appendChild(btn);
            });
        }

        function updateFavStreetButtonStyles() {
            const btns = document.querySelectorAll('.street-filter-btn');
            const btnsContainer = document.getElementById('fav-street-btns');
            const allBtn = btnsContainer.children[0]; 
            const allFavActive = currentSelectedStreet === 'ALL' && !showFavoritesOnly;

            if (allFavActive) {
                if(allBtn) allBtn.className = "px-2.5 py-1 text-xs rounded-lg font-bold transition whitespace-nowrap bg-blue-600 text-white";
                btns.forEach(b => b.className = "street-filter-btn px-2.5 py-1 text-xs rounded-lg font-medium transition whitespace-nowrap flex items-center gap-1 bg-gray-100 text-gray-600 hover:bg-gray-200");
            } else {
                if(allBtn) allBtn.className = "px-2.5 py-1 text-xs rounded-lg font-medium transition whitespace-nowrap bg-gray-200 text-gray-700 hover:bg-gray-300";
                btns.forEach(b => {
                    const s = b.getAttribute('data-street');
                    b.className = (s === currentSelectedStreet) 
                        ? "street-filter-btn px-2.5 py-1 text-xs rounded-lg font-bold transition whitespace-nowrap flex items-center gap-1 bg-amber-500 text-slate-950"
                        : "street-filter-btn px-2.5 py-1 text-xs rounded-lg font-medium transition whitespace-nowrap flex items-center gap-1 bg-gray-100 text-gray-600 hover:bg-gray-200";
                });
            }
        }

        function prepareAndRenderInitialCards() {
            currentPage = 1; 
            const container = document.getElementById('parking-list');
            container.innerHTML = ''; 

            filteredDataGlobal = parkingData.filter(item => {
                const matchRegion = (currentRegion === 'ALL' || item.regionCode === currentRegion);
                const matchVehicle = (currentVehicleType === 'ALL' || item.vehicleType === currentVehicleType);
                const matchSearch = (
                    item.id.toLowerCase().includes(currentSearch) ||
                    item.street.toLowerCase().includes(currentSearch) || 
                    item.district.toLowerCase().includes(currentSearch)
                );
                
                let matchFav = true;
                if (showFavoritesOnly) matchFav = favStreets.includes(item.street);
                if (currentSelectedStreet !== 'ALL') matchFav = (item.street === currentSelectedStreet);

                return matchRegion && matchVehicle && matchSearch && matchFav;
            });

            filteredDataGlobal.sort((a, b) => {
                const aFav = favStreets.includes(a.street) ? 1 : 0;
                const bFav = favStreets.includes(b.street) ? 1 : 0;
                if (aFav !== bFav) return bFav - aFav;
                const getOrder = (item) => {
                    if (item.meterStatus !== 'N') return 3; 
                    if (item.occupancyStatus === 'V') return 1; 
                    if (item.occupancyStatus === 'O') return 2; 
                    return 4;
                };
                return getOrder(a) - getOrder(b);
            });

            document.getElementById('total-count').innerText = filteredDataGlobal.length;

            if (filteredDataGlobal.length === 0) {
                container.innerHTML = `<div class="col-span-full text-center py-10 text-gray-400 text-sm">找不到符合條件的錶位</div>`;
                document.getElementById('displayed-count').innerText = "0";
                document.getElementById('infinite-scroll-trigger').classList.add('hidden');
                document.getElementById('all-loaded-text').classList.add('hidden');
                return;
            }

            appendCardsPage();
        }

        function appendCardsPage() {
            const container = document.getElementById('parking-list');
            const startIndex = (currentPage - 1) * itemsPerPage;
            const endIndex = Math.min(startIndex + itemsPerPage, filteredDataGlobal.length);
            const pageData = filteredDataGlobal.slice(startIndex, endIndex);

            pageData.forEach(item => {
                let occText = '';
                let meterText = '';
                let isUsable = item.meterStatus === 'N'; 
                let isAvailable = isUsable && item.occupancyStatus === 'V';
                const isStreetFaved = favStreets.includes(item.street);

                if (!isUsable) {
                    occText = '<i class="fa-solid fa-ban text-gray-400"></i> 暫停服務';
                } else if (item.occupancyStatus === 'V') {
                    occText = '<i class="fa-solid fa-circle-check text-green-600 font-bold"></i> <span class="text-green-700 font-extrabold">有空位</span>';
                } else if (item.occupancyStatus === 'O') {
                    occText = '<i class="fa-solid fa-car text-rose-500"></i> 已佔用';
                } else {
                    occText = '未知';
                }

                if (item.meterStatus === 'N') {
                    meterText = '<i class="fa-solid fa-check text-blue-500"></i> 正常';
                } else if (item.meterStatus === 'NU') {
                    meterText = '<i class="fa-solid fa-triangle-exclamation text-amber-500"></i> 暫停';
                }

                let vehicleTypeDesc = item.vehicleType === 'G' ? '貨車專用' : (item.vehicleType === 'C' ? '巴士專用' : '一般車輛');
                const mapsUrl = `https://www.google.com/maps/search/?api=1&query=${item.latitude},${item.longitude}`;

                let periodBadge = `<span class="bg-gray-100 text-gray-600 text-[10px] px-1.5 py-0.5 rounded font-bold">${item.maxParkingPeriod}</span>`;

                // 若為「有空位」則賦予明顯的綠色粗邊框與微綠底色，其餘維持簡約白底
                const cardBorderAndBg = isAvailable 
                    ? 'border-2 border-green-500 bg-green-50/20 shadow-md ring-1 ring-green-400/30' 
                    : 'border border-gray-200 bg-white shadow-sm';

                const cardHtml = `
                    <div class="rounded-xl transition overflow-hidden ${cardBorderAndBg} ${!isUsable ? 'opacity-75' : ''} flex flex-col justify-between relative">
                        ${isAvailable ? '<div class="absolute left-0 top-0 bottom-0 w-1.5 bg-green-500"></div>' : ''}
                        <div class="p-4 ${isAvailable ? 'pl-4.5' : ''}">
                            <div class="mb-2.5 flex justify-between items-center gap-1">
                                <span class="text-[11px] text-gray-500 font-medium">
                                    ${item.region} · ${item.district}
                                </span>
                                <div class="flex gap-1.5 items-center">
                                    ${periodBadge}
                                    <button onclick="toggleFavoriteStreet('${encodeURIComponent(item.street)}')" class="text-base p-1" title="收藏街道">
                                        <i class="${isStreetFaved ? 'fa-solid fa-star text-amber-500' : 'fa-regular fa-star text-gray-400'}"></i>
                                    </button>
                                </div>
                            </div>

                            <h3 class="text-xl font-bold text-gray-900 tracking-tight mb-1">${item.id}</h3>
                            <p class="text-gray-700 font-medium text-xs mb-1 truncate"><i class="fa-solid fa-location-dot text-gray-400 text-xs mr-1"></i>${item.street}</p>
                            <p class="text-gray-400 text-[11px] mb-3">柱號: ${item.poleId}</p>
                            
                            <div class="space-y-1.5 mb-3 text-xs text-gray-600 ${isAvailable ? 'bg-green-50/50 border-green-200' : 'bg-gray-50 border-gray-100'} p-2.5 rounded-lg border">
                                <div class="flex justify-between items-center">
                                    <span class="text-gray-400">錶柱：</span><span class="font-medium">${meterText}</span>
                                </div>
                                <div class="flex justify-between items-center">
                                    <span class="text-gray-400">狀態：</span><span class="font-medium">${occText}</span>
                                </div>
                            </div>
                        </div>

                        <div class="${isAvailable ? 'bg-green-50/30 border-green-100' : 'bg-gray-50/50 border-gray-100'} px-4 py-2 border-t flex justify-between items-center text-xs text-gray-500">
                            <span class="text-[11px]"><i class="fa-solid fa-car-side mr-1"></i>${vehicleTypeDesc}</span>
                            <a href="${mapsUrl}" target="_blank" class="text-blue-600 font-medium flex items-center gap-1 bg-white border border-gray-200 shadow-sm px-2.5 py-1 rounded-md text-xs hover:bg-gray-50">
                                <i class="fa-solid fa-map-location-dot"></i> 導航
                            </a>
                        </div>
                    </div>
                `;
                container.insertAdjacentHTML('beforeend', cardHtml);
            });

            document.getElementById('displayed-count').innerText = endIndex;
            const scrollTrigger = document.getElementById('infinite-scroll-trigger');
            const allLoadedText = document.getElementById('all-loaded-text');
            
            if (endIndex < filteredDataGlobal.length) {
                scrollTrigger.classList.remove('hidden');
                allLoadedText.classList.add('hidden');
            } else {
                scrollTrigger.classList.add('hidden');
                if (filteredDataGlobal.length > itemsPerPage) allLoadedText.classList.remove('hidden');
            }
        }

        function handleWindowScroll() {
            if (filteredDataGlobal.length === 0) return;
            const scrollTrigger = document.getElementById('infinite-scroll-trigger');
            if (scrollTrigger.classList.contains('hidden')) return; 

            if ((window.innerHeight + window.scrollY) >= document.documentElement.scrollHeight - 150) {
                currentPage++;
                appendCardsPage();
            }
        }

        window.toggleFavoriteStreet = function(encodedStreet) {
            const street = decodeURIComponent(encodedStreet);
            const index = favStreets.indexOf(street);
            if (index > -1) {
                favStreets.splice(index, 1); 
                if (currentSelectedStreet === street) currentSelectedStreet = 'ALL';
            } else {
                favStreets.push(street);     
            }
            localStorage.setItem(CACHE_KEY_FAV_STREETS, JSON.stringify(favStreets));
            renderFavStreetButtons(); 
            prepareAndRenderInitialCards();
        }

        function toggleFavoritesFilter() {
            showFavoritesOnly = !showFavoritesOnly;
            const btn = document.getElementById('fav-toggle-btn');
            const text = document.getElementById('fav-toggle-text');
            if (showFavoritesOnly) {
                btn.className = "bg-amber-500 hover:bg-amber-600 text-slate-900 px-2.5 py-1.5 rounded-lg text-xs transition flex items-center gap-1 font-bold";
                text.innerText = "全部";
                currentSelectedStreet = 'ALL';
            } else {
                btn.className = "bg-slate-700 hover:bg-slate-800 text-white px-2.5 py-1.5 rounded-lg text-xs transition flex items-center gap-1";
                text.innerText = "最愛";
            }
            if(favStreets.length > 0) updateFavStreetButtonStyles();
            prepareAndRenderInitialCards();
        }

        function clearCache() {
            localStorage.removeItem(CACHE_KEY_INFO);
            localStorage.removeItem(CACHE_KEY_TIME);
            alert("快取已清除！");
            window.location.reload();
        }

        function handleSearch(e) {
            currentSearch = e.target.value.toLowerCase().trim();
            prepareAndRenderInitialCards();
        }

        function setupRegionFilters() {
            const buttons = document.querySelectorAll('.region-filter-btn');
            buttons.forEach(btn => {
                btn.addEventListener('click', (e) => {
                    buttons.forEach(b => {
                        b.classList.remove('bg-blue-600', 'text-white');
                        b.classList.add('bg-gray-200', 'text-gray-700', 'hover:bg-gray-300');
                    });
                    e.target.classList.remove('bg-gray-200', 'text-gray-700', 'hover:bg-gray-300');
                    e.target.classList.add('bg-blue-600', 'text-white');
                    currentRegion = e.target.getAttribute('data-region');
                    prepareAndRenderInitialCards();
                });
            });
        }

        function setupVehicleFilters() {
            const buttons = document.querySelectorAll('.vehicle-filter-btn');
            buttons.forEach(btn => {
                btn.addEventListener('click', (e) => {
                    buttons.forEach(b => {
                        b.classList.remove('bg-indigo-600', 'text-white');
                        b.classList.add('bg-gray-100', 'text-gray-600', 'hover:bg-gray-200');
                    });
                    e.target.classList.remove('bg-gray-100', 'text-gray-600', 'hover:bg-gray-200');
                    e.target.classList.add('bg-indigo-600', 'text-white');
                    currentVehicleType = e.target.getAttribute('data-vehicle');
                    prepareAndRenderInitialCards();
                });
            });
        }

        function toggleLoading(isLoading) {
            const loader = document.getElementById('loading-view');
            const list = document.getElementById('parking-list');
            const icon = document.getElementById('refresh-icon');
            if (isLoading) {
                loader.classList.remove('hidden');
                list.classList.add('hidden');
                if(icon) icon.classList.add('fa-spin');
            } else {
                loader.classList.add('hidden');
                list.classList.remove('hidden');
                if(icon) icon.classList.remove('fa-spin');
            }
        }
    </script>
</body>
</html>
